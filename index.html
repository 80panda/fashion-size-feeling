  const [error, setError] = React.useState(null);
  const [preview, setPreview] = React.useState(null);
  const [selectedIdxs, setSelectedIdxs] = React.useState({});
  const fileInputRef = React.useRef(null);
  const pasteAreaRef = React.useRef(null);

  const resetPreview = () => { setPreview(null); setError(null); setSelectedIdxs({}); };

  const processImageFile = (file) => {
    if (!file || !file.type.startsWith('image/')) { setError('画像ファイルを選択してください'); return; }
    resetPreview();
    const reader = new FileReader();
    reader.onload = (e) => {
      const dataUrl = e.target.result;
      const base64 = dataUrl.split(',')[1];
      setImageData({ base64, mimeType: file.type, preview: dataUrl });
    };
    reader.readAsDataURL(file);
  };

  React.useEffect(() => {
    if (tab !== 'image' || !pasteAreaRef.current) return;
    const el = pasteAreaRef.current;
    const onPaste = (e) => {
      const items = e.clipboardData?.items || [];
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          e.preventDefault();
          processImageFile(item.getAsFile());
          return;
        }
      }
    };
    el.addEventListener('paste', onPaste);
    return () => el.removeEventListener('paste', onPaste);
  }, [tab]);

  const initSelections = (sizes) => {
    const init = {};
    sizes.forEach((s, i) => { if (Object.keys(s.measures).length > 0) init[i] = true; });
    return init;
  };

  const onParse = async () => {
    if (!text.trim()) return;
    setLoading(true); setError(null); setPreview(null);
    try {
      const result = await window.fittoLLM.parseSizeTable(text, hintCategory);
      setPreview(result); setSelectedIdxs(initSelections(result.sizes || []));
    } catch (e) { setError(e.message || '読み取りに失敗しました'); }
    finally { setLoading(false); }
  };

  const onParseImage = async () => {
    if (!imageData) return;
    setLoading(true); setError(null); setPreview(null);
    try {
      const result = await window.fittoLLM.parseSizeTableFromImage(imageData.base64, imageData.mimeType, hintCategory);
      setPreview(result); setSelectedIdxs(initSelections(result.sizes || []));
    } catch (e) { setError(e.message || '画像の読み取りに失敗しました'); }
    finally { setLoading(false); }
  };

  const toggleSize = (i) => setSelectedIdxs(prev => ({ ...prev, [i]: !prev[i] }));
  const toggleAll = () => {
    if (!preview) return;
    const allOn = preview.sizes.every((_, i) => selectedIdxs[i]);
    if (allOn) setSelectedIdxs({});
    else setSelectedIdxs(initSelections(preview.sizes));
  };

  const fieldJa = { waist:'ウエスト', hip:'ヒップ', thigh:'もも幅', rise:'股上', hem:'裾幅', inseam:'股下',
    shoulder:'肩幅', chest:'身幅', length:'着丈', sleeve:'袖丈', cuff:'袖口', neck:'首回り' };
  const catLabel = { pants:'ボトムス', tops:'トップス', outer:'アウター' };
  const selectedSizes = preview ? preview.sizes.filter((_, i) => selectedIdxs[i]) : [];

  const tabStyle = (active) => ({
    flex:1, appearance:'none', border:'none', borderBottom: active ? '2px solid #1c1c1c' : '2px solid transparent',
    background:'transparent', padding:'12px 0', fontSize:14, fontWeight:active?600:400,
    color: active ? '#1c1c1c' : '#8a8a8a', cursor:'pointer', fontFamily:'inherit', letterSpacing:'0.04em', minHeight:48
  });

  return (
    <div style={{ position:'absolute', inset:0, zIndex:100, background:'rgba(28,28,28,0.45)',
      display:'flex', alignItems:'flex-end', justifyContent:'center' }}>
      <div style={{ width:'100%', background:'#faf8f4', borderTopLeftRadius:16, borderTopRightRadius:16,
        padding:'18px 22px 26px', maxHeight:'92%', overflowY:'auto' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <span style={{ width:28, height:28, borderRadius:'50%', background:'#1c1c1c', color:'#faf8f4',
              display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, fontFamily:'"Cormorant Garamond",serif' }}>AI</span>
            <div style={{ fontFamily:'"Cormorant Garamond","Noto Sans JP",serif', fontSize:22, fontWeight:500, color:'#1c1c1c' }}>AIでサイズを読み取る</div>
          </div>
          <button onClick={onClose} style={{ appearance:'none', border:'none', background:'transparent', fontSize:15, color:'#8a8a8a', cursor:'pointer', padding:8 }}>閉じる</button>
        </div>

        <div style={{ display:'flex', borderBottom:'1px solid #e8e6e2', marginBottom:18 }}>
          <button style={tabStyle(tab==='text')} onClick={() => { setTab('text'); resetPreview(); }}>テキスト</button>
          <button style={tabStyle(tab==='image')} onClick={() => { setTab('image'); resetPreview(); }}>画像</button>
        </div>

        {tab === 'text' && (
          <>
            <div style={{ fontSize:13, color:'#4a4a4a', lineHeight:1.7, marginBottom:12 }}>ECサイトのサイズ表をコピーしてペーストしてください。</div>
            <textarea value={text} onChange={(e) => setText(e.target.value)}
              placeholder={'例：\nサイズ  ウエスト  ヒップ  股上  股下  もも幅  裾幅\nS      78      101    26    60    29    15.5'}
              style={{ width:'100%', minHeight:160, padding:'12px 14px', border:'1px solid #e8e6e2', borderRadius:2,
                fontSize:14, fontFamily:'ui-monospace,"SF Mono",Menlo,monospace', color:'#1c1c1c',
                background:'#ffffff', resize:'vertical', outline:'none', boxSizing:'border-box' }} />
          </>
        )}

        {tab === 'image' && (
          <>
            <div style={{ fontSize:13, color:'#4a4a4a', lineHeight:1.7, marginBottom:12 }}>
              サイズ表の画像を読み込んでください。スクリーンショットのペースト、カメラ撮影、ファイル選択が使えます。
            </div>
            <div ref={pasteAreaRef} tabIndex={0}
              onDragOver={(e) => e.preventDefault()}
              onDrop={(e) => { e.preventDefault(); processImageFile(e.dataTransfer.files[0]); }}
              style={{ width:'100%', minHeight:160, border:'1px dashed #cdcac3', borderRadius:2, background:'#ffffff',
                display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
                gap:14, boxSizing:'border-box', outline:'none', cursor:'default', padding:'16px',
                overflow:'hidden', position:'relative' }}>
              {imageData ? (
                <>
                  <img src={imageData.preview} alt="" style={{ maxWidth:'100%', maxHeight:240, objectFit:'contain' }} />
                  <button onClick={() => setImageData(null)} style={{ appearance:'none', border:'none', background:'rgba(28,28,28,0.6)', color:'#fff',
                    padding:'6px 14px', borderRadius:999, fontSize:13, cursor:'pointer', fontFamily:'inherit' }}>削除</button>
                </>
              ) : (
                <>
                  <div style={{ fontSize:13, color:'#8a8a8a', textAlign:'center', lineHeight:1.8 }}>
                    ここに画像をペースト<br/>またはドロップ
                  </div>
                  <button onClick={() => fileInputRef.current?.click()} style={{ appearance:'none', cursor:'pointer', fontFamily:'inherit',
                    padding:'12px 24px', background:'#1c1c1c', color:'#faf8f4', border:'none', borderRadius:2, fontSize:14, minHeight:48 }}>
                    カメラ / ファイルを選択
                  </button>
                </>
              )}
            </div>
            <input ref={fileInputRef} type="file" accept="image/*" capture="environment"
              style={{ display:'none' }} onChange={(e) => processImageFile(e.target.files?.[0])} />
          </>
        )}
        {error && <div style={{ marginTop:12, padding:'12px 14px', background:'#fbf3ee', border:'1px solid #e8c7b6', color:'#b86a4a', fontSize:13, lineHeight:1.6 }}>{error}</div>}
        {preview && (
          <div style={{ marginTop:14, padding:'14px 16px', background:'#ffffff', border:'1px solid #ececec' }}>
            <div style={{ display:'flex', gap:10, alignItems:'baseline', marginBottom:10 }}>
              <div style={{ fontSize:11, letterSpacing:'0.18em', color:'#8a8a8a', textTransform:'uppercase' }}>読み取り結果</div>
              <div style={{ flex:1, height:1, background:'#e8e6e2' }} />
              <div style={{ fontSize:12, color:'#8a8a8a' }}>信頼度: {preview.confidence}</div>
            </div>
            <div style={{ fontSize:14, color:'#1c1c1c', marginBottom:14 }}><span style={{ color:'#8a8a8a' }}>カテゴリ: </span>{catLabel[preview.category]}</div>

            {preview.sizes.length === 0 ? (
              <div style={{ fontSize:13, color:'#b86a4a', padding:'10px 0' }}>サイズが読み取れませんでした</div>
            ) : (
              <>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
                  <div style={{ fontSize:11, letterSpacing:'0.16em', color:'#8a8a8a', textTransform:'uppercase' }}>使うサイズを選択（複数可）</div>
                  <button onClick={toggleAll} style={{ appearance:'none', border:'none', background:'transparent',
                    color:'#1c1c1c', fontSize:12, cursor:'pointer', fontFamily:'inherit', padding:'6px 10px' }}>
                    {preview.sizes.every((_, i) => selectedIdxs[i]) ? '全解除' : '全選択'}
                  </button>
                </div>
                <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                  {preview.sizes.map((s, i) => {
                    const sel = !!selectedIdxs[i];
                    const empty = Object.keys(s.measures).length === 0;
                    return (
                      <label key={i} style={{ display:'flex', alignItems:'center', gap:12, padding:'12px 14px', cursor: empty?'default':'pointer',
                        background:sel?'#1c1c1c':'#ffffff', color:sel?'#faf8f4':'#1c1c1c',
                        border:`1px solid ${sel?'#1c1c1c':'#d8d6d2'}`, opacity: empty ? 0.5 : 1 }}>
                        <input type="checkbox" checked={sel} disabled={empty} onChange={() => toggleSize(i)}
                          style={{ accentColor:sel?'#faf8f4':'#1c1c1c', width:20, height:20 }} />
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontSize:15, fontWeight:500, marginBottom:4 }}>
                            サイズ {s.sizeLabel || `#${i+1}`}
                            {s.isRange && <span style={{ marginLeft:6, opacity:0.6, fontSize:11 }}>±範囲</span>}
                          </div>
                          <div style={{ display:'flex', flexWrap:'wrap', gap:5 }}>
                            {empty ? (
                              <span style={{ fontSize:12, opacity:0.7 }}>項目読み取り失敗</span>
                            ) : (
                              Object.entries(s.measures).slice(0, 5).map(([k, v]) => (
                                <span key={k} style={{ fontSize:11, padding:'2px 8px',
                                  background: sel ? 'rgba(250,248,244,0.15)' : '#f3f0ea',
                                  color: sel ? 'rgba(250,248,244,0.9)' : '#4a4a4a',
                                  borderRadius:999, fontVariantNumeric:'tabular-nums' }}>
                                  {fieldJa[k]||k} {v}
                                </span>
                              ))
                            )}
                            {Object.keys(s.measures).length > 5 && <span style={{ fontSize:11, opacity:0.6 }}>+{Object.keys(s.measures).length-5}</span>}
                          </div>
                        </div>
                      </label>
                    );
                  })}
                </div>
              </>
            )}
            {preview.notes && <div style={{ fontSize:11, color:'#8a8a8a', lineHeight:1.6, marginTop:10 }}>※ {preview.notes}</div>}
          </div>
        )}
        <div style={{ display:'flex', gap:10, marginTop:18 }}>
          <button onClick={onClose} style={{ appearance:'none', cursor:'pointer', flex:1, background:'transparent',
            color:'#1c1c1c', border:'1px solid #d8d6d2', borderRadius:2, padding:'14px 18px', fontSize:15, fontFamily:'inherit', minHeight:52 }}>キャンセル</button>
          {!preview ? (
            tab === 'text' ? (
              <button onClick={onParse} disabled={loading||!text.trim()} style={{ appearance:'none', cursor:loading?'default':'pointer', flex:2,
                background:loading||!text.trim()?'#cdcac3':'#1c1c1c', color:'#faf8f4', border:'none', borderRadius:2,
                padding:'14px 18px', fontSize:15, fontWeight:500, letterSpacing:'0.06em', fontFamily:'inherit', minHeight:52 }}>
                {loading?'読み取り中…':'AIで読み取る'}
              </button>
            ) : (
              <button onClick={onParseImage} disabled={loading||!imageData} style={{ appearance:'none', cursor:loading?'default':'pointer', flex:2,
                background:loading||!imageData?'#cdcac3':'#1c1c1c', color:'#faf8f4', border:'none', borderRadius:2,
                padding:'14px 18px', fontSize:15, fontWeight:500, letterSpacing:'0.06em', fontFamily:'inherit', minHeight:52 }}>
                {loading?'解析中…':'画像を解析する'}
              </button>
            )
          ) : (
            <button onClick={() => onResult(preview, selectedSizes)}
              disabled={selectedSizes.length === 0} style={{ appearance:'none', cursor:'pointer', flex:2,
              background:selectedSizes.length === 0 ?'#cdcac3':'#1c1c1c',
              color:'#faf8f4', border:'none', borderRadius:2, padding:'14px 18px', fontSize:15, fontWeight:500,
              letterSpacing:'0.06em', fontFamily:'inherit', minHeight:52 }}>
              {selectedSizes.length > 0 ? `${selectedSizes.length}件を追加する` : 'サイズを選択してください'}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

window.fittoScreens.CompareInputScreen = CompareInputScreen;
</script>

<!-- ── screens-result ── -->
<script type="text/babel">
function ResultScreen({ base, candidate, wardrobe, judgementUI, showLabels, onBack, onSave, onChangeBase }) {
  const { Chrome, NavBtn, PrimaryBtn, GhostBtn, VerdictPill } = window.fittoUI;
  const { compareItem, verdict } = window.fittoData;
  const { FigureCompare } = window.fittoFigure;
  const cat = CATEGORIES[candidate.category];
  const sizes = (candidate.sizes || []).filter(s => Object.keys(s.measures || {}).length >= 2);
  const [expandedId, setExpandedId] = React.useState(null);

  const sizeResults = sizes.map(s => {
    const rows = compareItem(base, { category: candidate.category, measures: s.measures });
    const v = verdict(rows);
    return { size: s, rows, verdict: v };
  }).sort((a, b) => (b.verdict.score || 0) - (a.verdict.score || 0));

  React.useEffect(() => {
    if (sizeResults.length > 0 && !expandedId) setExpandedId(sizeResults[0].size.id);
  }, []);

  const sameCatBases = wardrobe.filter(w => w.category === candidate.category);
  const baseScores = sameCatBases.map(b => {
    const scores = sizes.map(s => verdict(compareItem(b, { category: candidate.category, measures: s.measures })).score || 0);
    return { base: b, score: Math.max(...scores, 0) };
  }).sort((a, b) => b.score - a.score);
  const currentScore = baseScores.find(bs => bs.base.id === base.id)?.score ?? 0;
  const recommended = baseScores[0];
  const showRecommend = recommended && recommended.base.id !== base.id && (recommended.score - currentScore > 5);

  const toneBg = { ok:'#1c1c1c', soft:'#6b7c5a', warn:'#b86a4a', bad:'#8a3a1c', neutral:'#cdcac3' };

  return (
    <Chrome title="比較結果" leading={<NavBtn onClick={onBack}>‹ 戻る</NavBtn>} trailing={<NavBtn ghost onClick={onSave}>保存</NavBtn>}>
      <div style={{ padding:'10px 24px 14px' }}>
        <div style={{ display:'flex', alignItems:'stretch', gap:10 }}>
          <button onClick={onChangeBase} style={{ appearance:'none', border:'1px solid #e8e6e2', background:'#ffffff',
            flex:1, padding:'14px 16px', textAlign:'left', cursor:'pointer', fontFamily:'inherit', minHeight:72 }}>
            <div style={{ fontSize:11, letterSpacing:'0.18em', color:'#8a8a8a', textTransform:'uppercase' }}>BASE ★</div>
            <div style={{ fontSize:14, color:'#1c1c1c', fontWeight:500, marginTop:4, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{base.name}</div>
            <div style={{ fontSize:12, color:'#8a8a8a', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', marginTop:2 }}>{base.brand} · {base.sizeLabel}</div>
          </button>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'center', width:32, fontSize:22, color:'#cdcac3', fontFamily:'"Cormorant Garamond",serif' }}>↔</div>
          <div style={{ background:'#1c1c1c', color:'#faf8f4', flex:1, padding:'14px 16px' }}>
            <div style={{ fontSize:11, letterSpacing:'0.18em', color:'rgba(250,248,244,0.6)', textTransform:'uppercase' }}>CANDIDATE</div>
            <div style={{ fontSize:14, fontWeight:500, marginTop:4, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{candidate.brand||'商品名未設定'}</div>
            <div style={{ fontSize:12, color:'rgba(250,248,244,0.6)', marginTop:2 }}>{sizes.length}サイズ比較中</div>
          </div>
        </div>
      </div>

      {showRecommend && (
        <div style={{ margin:'6px 24px 14px', padding:'14px 16px', background:'#fbf6f0', border:'1px solid #f1e2d3' }}>
          <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
            <span style={{ fontSize:14 }}>★</span>
            <div style={{ fontSize:11, letterSpacing:'0.16em', color:'#b86a4a', textTransform:'uppercase', fontWeight:500 }}>もっと近い基準があります</div>
          </div>
          <div style={{ fontSize:14, color:'#1c1c1c', lineHeight:1.6, marginBottom:12 }}>
            <span style={{ fontWeight:500 }}>{recommended.base.name}</span> の方が近そうです（スコア {recommended.score} vs 現在 {currentScore}）
          </div>
          <button onClick={() => onChangeBase()} style={{ appearance:'none', border:'1px solid #b86a4a', background:'#ffffff',
            color:'#b86a4a', padding:'10px 16px', fontSize:13, fontWeight:500, cursor:'pointer', fontFamily:'inherit',
            borderRadius:2, minHeight:44 }}>
            こちらに切り替える ›
          </button>
        </div>
      )}

      {sizeResults.length === 0 ? (
        <div style={{ padding:'40px 24px', textAlign:'center', fontSize:14, color:'#8a8a8a' }}>
          比較できるサイズがありません
        </div>
      ) : (
        <div style={{ padding:'0 24px 4px' }}>
          <div style={{ display:'flex', alignItems:'baseline', justifyContent:'space-between', marginBottom:12 }}>
            <div style={{ fontSize:11, letterSpacing:'0.18em', color:'#8a8a8a', textTransform:'uppercase' }}>サイズ別の判定</div>
            <div style={{ fontSize:12, color:'#8a8a8a' }}>スコア順</div>
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            {sizeResults.map((sr, idx) => {
              const isBest = idx === 0 && sizeResults.length > 1;
              const isExpanded = expandedId === sr.size.id;
              const dotColor = toneBg[sr.verdict.tone] || '#cdcac3';
              return (
                <div key={sr.size.id} style={{ background:'#ffffff',
                  border: isBest ? '2px solid #1c1c1c' : '1px solid #e8e6e2' }}>
                  <button onClick={() => setExpandedId(isExpanded ? null : sr.size.id)}
                    style={{ appearance:'none', width:'100%', textAlign:'left', cursor:'pointer', fontFamily:'inherit',
                      background:'transparent', border:'none', padding:'16px 18px',
                      display:'flex', alignItems:'center', gap:14 }}>
                    {isBest && (
                      <div style={{ position:'absolute', marginTop:-30, marginLeft:-2, background:'#1c1c1c', color:'#faf8f4',
                        fontSize:10, letterSpacing:'0.18em', padding:'4px 10px', textTransform:'uppercase' }}>★ BEST</div>
                    )}
                    <div style={{ width:50, height:50, borderRadius:'50%', background:dotColor, color:'#faf8f4',
                      display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, fontFamily:'"Cormorant Garamond",serif' }}>
                      <div style={{ fontSize:17, fontWeight:500, lineHeight:1 }}>{sr.verdict.score ?? '—'}</div>
                    </div>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:16, fontWeight:500, color:'#1c1c1c', marginBottom:4 }}>サイズ {sr.size.sizeLabel || '(未設定)'}</div>
                      <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                        <VerdictPill tone={sr.verdict.tone} small>{sr.verdict.label}</VerdictPill>
                        <span style={{ fontSize:11, color:'#8a8a8a' }}>{sr.verdict.summary}</span>
                      </div>
                    </div>
                    <div style={{ fontSize:18, color:'#cdcac3' }}>{isExpanded ? '▾' : '▸'}</div>
                  </button>
                  {isExpanded && (
                    <div style={{ borderTop:'1px solid #f0eee9', padding:'4px 0 12px' }}>
                      <div style={{ margin:'8px 12px 0', background:'#fbfaf6', borderTop:'1px solid #ececec', borderBottom:'1px solid #ececec', padding:'8px 0' }}>
                        <FigureCompare category={candidate.category} rows={sr.rows} showLabels={showLabels} height={300} />
                      </div>
                      <div style={{ padding:'14px 12px 0' }}>
                        {(judgementUI === 'all' || !judgementUI) && (
                          <>
                            <VerdictScoreView v={sr.verdict} rows={sr.rows} compact />
                            <VerdictBreakdownView v={sr.verdict} rows={sr.rows} cat={cat} />
                          </>
                        )}
                        {judgementUI === 'label' && <VerdictLabelView v={sr.verdict} />}
                        {judgementUI === 'score' && <VerdictScoreView v={sr.verdict} rows={sr.rows} />}
                        {judgementUI === 'breakdown' && <VerdictBreakdownView v={sr.verdict} rows={sr.rows} cat={cat} />}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {sameCatBases.length > 1 && (
        <div style={{ padding:'24px 24px 4px' }}>
          <div style={{ fontSize:11, letterSpacing:'0.18em', color:'#8a8a8a', textTransform:'uppercase', marginBottom:12 }}>他の基準と比べる</div>
          <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
            {baseScores.map(bs => {
              const isCurrent = bs.base.id === base.id;
              const tone = bs.score >= 88 ? 'ok' : bs.score >= 70 ? 'soft' : 'warn';
              return (
                <button key={bs.base.id} onClick={() => !isCurrent && onChangeBase()}
                  disabled={isCurrent}
                  style={{ appearance:'none', textAlign:'left', cursor: isCurrent?'default':'pointer', fontFamily:'inherit',
                    display:'flex', alignItems:'center', gap:12, padding:'14px 16px',
                    background: isCurrent ? '#f3f0ea' : '#ffffff',
                    border: isCurrent ? '1px solid #1c1c1c' : '1px solid #e8e6e2' }}>
                  <span style={{ fontSize:14 }}>{bs.base.primary?'★':'·'}</span>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:14, fontWeight:500, color:'#1c1c1c' }}>{bs.base.name}</div>
                    <div style={{ fontSize:11, color:'#8a8a8a', marginTop:2 }}>{bs.base.brand} · {bs.base.sizeLabel}</div>
                  </div>
                  <div style={{ fontFamily:'"Cormorant Garamond",serif', fontSize:18, fontWeight:500, color:'#1c1c1c', fontVariantNumeric:'tabular-nums' }}>
                    {bs.score}
                  </div>
                  <VerdictPill tone={tone} small>
                    {isCurrent ? '現在' : bs.score >= 88 ? '近い' : bs.score >= 70 ? '中' : '遠い'}
                  </VerdictPill>
                </button>
              );
            })}
          </div>
        </div>
      )}

      <div style={{ padding:'24px 24px 32px', display:'flex', gap:12 }}>
        <GhostBtn onClick={onBack}>サイズを直す</GhostBtn>
        <PrimaryBtn onClick={onSave}>保存して戻る</PrimaryBtn>
      </div>
    </Chrome>
  );
}

function VerdictLabelView({ v, compact=false }) {
  const { VerdictPill } = window.fittoUI;
  const conf = v.score == null ? '—' : v.score >= 88 ? '高' : v.score >= 70 ? '中' : '低';
  return (
    <div style={{ background:'#ffffff', border:'1px solid #ececec', padding:compact?'16px 18px':'22px 20px', marginBottom:compact?14:0 }}>
      <div style={{ display:'flex', alignItems:'baseline', gap:10, marginBottom:10 }}>
        <div style={{ fontSize:11, letterSpacing:'0.18em', color:'#8a8a8a', textTransform:'uppercase' }}>判定</div>
        <div style={{ flex:1, height:1, background:'#e8e6e2' }} />
        <div style={{ fontSize:12, color:'#8a8a8a' }}>信頼度 {conf}</div>
      </div>
      <div style={{ fontFamily:'"Cormorant Garamond","Noto Sans JP",serif', fontSize:compact?32:40, fontWeight:500, lineHeight:1.1, color:'#1c1c1c', marginBottom:10 }}>{v.label}</div>
      <div style={{ fontSize:14, lineHeight:1.7, color:'#4a4a4a', marginBottom:12 }}>{v.summary}</div>
      <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
        {v.tightCount > 0 && <VerdictPill tone="warn" small>タイト {v.tightCount}箇所</VerdictPill>}
        {v.looseCount > 0 && <VerdictPill tone="soft" small>ゆとり {v.looseCount}箇所</VerdictPill>}
        {v.majorCount > 0 && <VerdictPill tone="bad" small>差大 {v.majorCount}箇所</VerdictPill>}
        {v.tightCount === 0 && v.looseCount === 0 && <VerdictPill tone="ok" small>全項目ジャスト</VerdictPill>}
      </div>
    </div>
  );
}

function VerdictScoreView({ v, rows, compact=false }) {
  const { TOLERANCE } = window.fittoData;
  const score = v.score ?? 0;
  const r = 36, c = 2 * Math.PI * r, dash = (score / 100) * c;
  const stroke = { ok:'#1c1c1c', soft:'#6b7c5a', warn:'#b86a4a', bad:'#8a3a1c' }[v.tone] || '#cdcac3';
  return (
    <div style={{ background:'#ffffff', border:'1px solid #ececec', padding:compact?'16px 18px':'22px 20px',
      marginBottom:compact?14:0, display:'flex', alignItems:'center', gap:20 }}>
      <div style={{ position:'relative', width:104, height:104, flexShrink:0 }}>
        <svg width="104" height="104" viewBox="0 0 104 104">
          <circle cx="52" cy="52" r={r} fill="none" stroke="#ececec" strokeWidth="4" />
          <circle cx="52" cy="52" r={r} fill="none" stroke={stroke} strokeWidth="4"
            strokeDasharray={`${dash} ${c}`} strokeLinecap="butt" transform="rotate(-90 52 52)" />
        </svg>
        <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column' }}>
          <div style={{ fontFamily:'"Cormorant Garamond",serif', fontSize:36, fontWeight:500, color:'#1c1c1c', lineHeight:1 }}>{score}</div>
          <div style={{ fontSize:10, letterSpacing:'0.16em', color:'#8a8a8a', textTransform:'uppercase', marginTop:3 }}>fit score</div>
        </div>
      </div>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ fontSize:11, letterSpacing:'0.18em', color:'#8a8a8a', textTransform:'uppercase', marginBottom:6 }}>スコア内訳</div>
        <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
          {[
            { label:'ジャスト', count:rows.filter(r => r.status==='fit').length, color:'#1c1c1c' },
            { label:'ゆとり', count:rows.filter(r => r.diff!=null && r.diff > (TOLERANCE[r.key]?.fit||2)).length, color:'#6b7c5a' },
            { label:'タイト', count:rows.filter(r => r.diff!=null && r.diff < -(TOLERANCE[r.key]?.fit||2)).length, color:'#b86a4a' },
          ].map(({ label, count, color }) => {
            const total = rows.filter(r => r.diff!=null).length;
            const pct = total ? (count/total)*100 : 0;
            return (
              <div key={label} style={{ display:'flex', alignItems:'center', gap:10 }}>
                <div style={{ width:60, fontSize:12, color:'#4a4a4a' }}>{label}</div>
                <div style={{ flex:1, height:5, background:'#f3f0ea', position:'relative' }}>
                  <div style={{ position:'absolute', inset:0, width:`${pct}%`, background:color }} />
                </div>
                <div style={{ width:28, fontSize:12, color:'#8a8a8a', textAlign:'right', fontVariantNumeric:'tabular-nums' }}>{count}</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function VerdictBreakdownView({ v, rows, cat }) {
  return (
    <div style={{ background:'#ffffff', border:'1px solid #ececec' }}>
      <div style={{ padding:'14px 18px 12px', borderBottom:'1px solid #ececec', display:'flex', alignItems:'baseline', gap:10 }}>
        <div style={{ fontSize:11, letterSpacing:'0.18em', color:'#8a8a8a', textTransform:'uppercase' }}>項目別の差分</div>
        <div style={{ flex:1, height:1, background:'#e8e6e2' }} />
        <div style={{ fontSize:12, color:'#8a8a8a' }}>{v.valid}/{cat.fields.length}項目</div>
      </div>
      {rows.map((r, i) => {
        const { TOLERANCE } = window.fittoData;
        const tol = TOLERANCE[r.key] || { fit:2, loose:4, major:7 };
        const labelMap = {
          fit:{ ja:'ジャスト', tone:'ok' }, 'slightly-loose':{ ja:'ややゆるい', tone:'soft' },
          'slightly-tight':{ ja:'ややタイト', tone:'soft' }, loose:{ ja:'ゆるい', tone:'warn' },
          tight:{ ja:'タイト', tone:'warn' }, 'too-loose':{ ja:'差大（ゆるい）', tone:'bad' },
          'too-tight':{ ja:'差大（タイト）', tone:'bad' }, missing:{ ja:'データなし', tone:'neutral' },
        };
        const tag = labelMap[r.status] || labelMap.missing;
        const dotColor = { ok:'#1c1c1c', soft:'#6b7c5a', warn:'#b86a4a', bad:'#8a3a1c', neutral:'#cdcac3' }[tag.tone];
        const range = tol.major + 2;
        const pct = r.diff == null ? 50 : Math.max(0, Math.min(100, 50 + (r.diff/range)*50));
        return (
          <div key={r.key} style={{ padding:'14px 18px', borderBottom: i === rows.length-1 ? 'none' : '1px solid #f0eee9' }}>
            <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:8 }}>
              <div style={{ width:28, height:28, borderRadius:'50%', border:'1px solid #d8d6d2',
                display:'flex', alignItems:'center', justifyContent:'center',
                fontSize:11, color:'#8a8a8a', fontFamily:'"Cormorant Garamond",serif' }}>{r.short}</div>
              <div style={{ fontSize:14, fontWeight:500, color:'#1c1c1c' }}>{r.ja}</div>
              {r.estimated && <span style={{ fontSize:10, letterSpacing:'0.1em', color:'#b86a4a', border:'1px solid #e8c7b6', padding:'2px 6px' }}>推定</span>}
              <div style={{ flex:1 }} />
              <div style={{ fontSize:13, fontVariantNumeric:'tabular-nums', color:'#8a8a8a' }}>
                {r.base??'—'}<span style={{ margin:'0 4px' }}>→</span>
                <span style={{ color:'#1c1c1c', fontWeight:500 }}>{r.target??'—'}</span><span style={{ marginLeft:4 }}>cm</span>
              </div>
            </div>
            <div style={{ position:'relative', height:5, background:'#f3f0ea', marginLeft:40, marginBottom:8 }}>
              <div style={{ position:'absolute', left:'50%', top:-2, bottom:-2, width:1, background:'#cdcac3' }} />
              <div style={{ position:'absolute', top:0, bottom:0, left:`${50-(tol.fit/range)*50}%`, width:`${(tol.fit*2/range)*50}%`, background:'#e8e6e2' }} />
              {r.diff != null && <div style={{ position:'absolute', top:-3, height:11, width:2, left:`${pct}%`, transform:'translateX(-1px)', background:dotColor }} />}
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:10, marginLeft:40 }}>
              <span style={{ width:8, height:8, borderRadius:'50%', background:dotColor }} />
              <span style={{ fontSize:13, color:'#1c1c1c' }}>{tag.ja}</span>
              {r.diff != null && <span style={{ fontSize:13, color:'#8a8a8a', fontVariantNumeric:'tabular-nums', marginLeft:'auto' }}>{r.diff>0?'+':''}{r.diff.toFixed(1)}cm</span>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

window.fittoScreens.ResultScreen = ResultScreen;
</script>

<!-- ── app ── -->
<script type="text/babel">
const { DEFAULT_WARDROBE, EMPTY_DRAFT } = window.fittoData;
const { HomeScreen, SetupListScreen, SetupEditScreen, CompareInputScreen, ResultScreen } = window.fittoScreens;

function useLocalStorage(key, defaultValue) {
  const [value, setValue] = React.useState(() => {
    try {
      const stored = localStorage.getItem(key);
      return stored ? JSON.parse(stored) : defaultValue;
    } catch { return defaultValue; }
  });
  const set = React.useCallback((v) => {
    setValue(prev => {
      const next = typeof v === 'function' ? v(prev) : v;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      return next;
    });
  }, [key]);
  return [value, set];
}

function App() {
  const [t, setTweak] = useTweaks(window.TWEAK_DEFAULTS);
  const [wardrobe, setWardrobe] = useLocalStorage('fitto_wardrobe', DEFAULT_WARDROBE);
  const [history, setHistory]   = useLocalStorage('fitto_history', []);
  const [screen, setScreen]     = React.useState('home');
  const [draft, setDraft] = React.useState({ ...EMPTY_DRAFT });
  const [editTarget, setEditTarget] = React.useState(null);

  const baseGarment = wardrobe.find(w => w.id === draft.baseId)
    || wardrobe.find(w => w.category === draft.category && w.primary)
    || wardrobe.find(w => w.category === draft.category);

  const onSaveItem = (item) => {
    setWardrobe(ws => {
      const idx = ws.findIndex(w => w.id === item.id);
      let next = idx >= 0 ? (next = ws.slice(), next[idx] = item, next) : [...ws, item];
      if (item.primary) next = next.map(w => w.category === item.category && w.id !== item.id ? { ...w, primary:false } : w);
      return next;
    });
    setScreen('setup');
  };

  const onTogglePrimary = (id) => {
    setWardrobe(ws => {
      const target = ws.find(w => w.id === id);
      if (!target) return ws;
      return ws.map(w => {
        if (w.id === id) return { ...w, primary:!w.primary };
        if (w.category === target.category && !target.primary) return { ...w, primary:false };
        return w;
      });
    });
  };

  const onSaveResult = () => {
    const { compareItem, verdict } = window.fittoData;
    if (!baseGarment || !draft.sizes?.length) { setScreen('home'); return; }
    let bestSize = draft.sizes[0], bestScore = -1;
    draft.sizes.forEach(s => {
      const score = verdict(compareItem(baseGarment, { category:draft.category, measures:s.measures })).score;
      if (score > bestScore) { bestScore = score; bestSize = s; }
    });
    const v = verdict(compareItem(baseGarment, { category:draft.category, measures:bestSize.measures }));
    const newH = { id:'h'+Date.now(), category:draft.category,
      brand:(draft.brand||'').split(' — ')[0]||draft.brand||'無題',
      product:(draft.brand||'').split(' — ')[1]||bestSize.sizeLabel||'',
      date:'今日', baseName:baseGarment?.name||'', label:v.label, tone:v.tone };
    setHistory(h => [newH, ...h]);
    setScreen('home');
  };

  let screenEl;
  if (screen === 'home') {
    screenEl = <HomeScreen wardrobe={wardrobe} history={history} onCompare={() => setScreen('compare')}
      onSetup={() => setScreen('setup')} onItem={(w) => { setEditTarget(w); setScreen('edit'); }} />;
  } else if (screen === 'compare') {
    screenEl = <CompareInputScreen wardrobe={wardrobe} draft={draft} setDraft={setDraft}
      onBack={() => setScreen('home')} onCompute={() => setScreen('result')} />;
  } else if (screen === 'result') {
    screenEl = baseGarment ? <ResultScreen base={baseGarment} candidate={draft} wardrobe={wardrobe}
      judgementUI={t.judgementUI} showLabels={t.showLabels}
      onBack={() => setScreen('compare')} onSave={onSaveResult} onChangeBase={() => setScreen('compare')} /> : null;
  } else if (screen === 'setup') {
    screenEl = <SetupListScreen wardrobe={wardrobe} onBack={() => setScreen('home')}
      onAdd={() => { setEditTarget(null); setScreen('edit'); }}
      onEdit={(item) => { setEditTarget(item); setScreen('edit'); }}
      onTogglePrimary={onTogglePrimary}
      onReset={() => { setWardrobe([]); setHistory([]); setScreen('home'); }} />;
  } else if (screen === 'edit') {
    screenEl = <SetupEditScreen initial={editTarget} onBack={() => setScreen('setup')} onSave={onSaveItem} />;
  }

  return (
    <>
      <style>{`
        @keyframes fitto-fade { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
        #root { height: 100%; }
        #fitto-app { display:flex; flex-direction:column; height:100%; min-height:100dvh;
          width:100%; max-width:480px; margin:0 auto; background:var(--paper);
          box-shadow: 0 0 60px rgba(0,0,0,0.04);
          padding-top:env(safe-area-inset-top);
          padding-bottom:env(safe-area-inset-bottom);
          padding-left:env(safe-area-inset-left);
          padding-right:env(safe-area-inset-right); }
        #fitto-screen { flex:1; min-height:0; display:flex; flex-direction:column; overflow:hidden; }
        #fitto-screen > div { flex:1; min-height:0; }
        @media (min-width: 481px) {
          #fitto-app { min-height:100dvh; }
        }
      `}</style>
      <div id="fitto-app">
        <div id="fitto-screen">
          <div key={screen} style={{ width:'100%', height:'100%', display:'flex', flexDirection:'column', animation:'fitto-fade 220ms ease' }}>
            {screenEl}
          </div>
        </div>
      </div>

      <TweaksPanel>
        <TweakSection label="判定UIのバリエーション" />
        <TweakRadio label="表示" value={t.judgementUI}
          options={[{value:'all',label:'全部入り'},{value:'label',label:'ラベル'},{value:'score',label:'スコア'},{value:'breakdown',label:'項目別'}]}
          onChange={(v) => setTweak('judgementUI', v)} />
        <TweakSection label="図のラベル" />
        <TweakToggle label="吹き出しを表示" value={t.showLabels} onChange={(v) => setTweak('showLabels', v)} />
        <TweakSection label="ジャンプ" />
        <TweakButton label="ホーム" onClick={() => setScreen('home')} />
        <TweakButton label="比較入力" onClick={() => setScreen('compare')} />
        <TweakButton label="結果画面" onClick={() => setScreen('result')} />
        <TweakButton label="ジャストの服一覧" onClick={() => setScreen('setup')} />
        <TweakButton label="新規登録" onClick={() => { setEditTarget(null); setScreen('edit'); }} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

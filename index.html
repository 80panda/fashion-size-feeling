<!-- ── tweaks-panel ── -->
<script type="text/babel">
const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
    max-height:calc(100vh - 32px);display:flex;flex-direction:column;
    background:rgba(250,249,247,.78);color:#29261b;
    -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);
    border:.5px solid rgba(255,255,255,.6);border-radius:14px;
    box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);
    font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;
    padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
    width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;
    overflow-y:auto;min-height:0}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-sect:first-child{padding-top:0}
  .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;background:rgba(0,0,0,.06);user-select:none}
  .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;
    background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);transition:left .15s,width .15s}
  .twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;
    background:transparent;color:inherit;font:inherit;font-weight:500;min-height:22px;
    border-radius:6px;cursor:default;padding:4px 6px}
  .twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;
    background:rgba(0,0,0,.15);transition:background .15s;cursor:default;padding:0}
  .twk-toggle[data-on="1"]{background:#34c759}
  .twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;
    background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}
  .twk-toggle[data-on="1"] i{transform:translateX(14px)}
  .twk-btn{appearance:none;height:26px;padding:0 12px;border:0;border-radius:7px;
    background:rgba(0,0,0,.78);color:#fff;font:inherit;font-weight:500;cursor:default}
  .twk-btn:hover{background:rgba(0,0,0,.88)}
`;

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      panel.style.right = Math.max(16, offsetRef.current.x) + 'px';
      panel.style.bottom = Math.max(16, offsetRef.current.y) + 'px';
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onClick={() => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); }}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label }) {
  return <div className="twk-sect">{label}</div>;
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const trackRef = React.useRef(null);
  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const i = Math.floor(((clientX - r.left - 2) / (r.width - 4)) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };
  const onPointerDown = (e) => {
    const v0 = segAt(e.clientX);
    if (v0 !== value) onChange(v0);
    const move = (ev) => { const v = segAt(ev.clientX); if (v !== value) onChange(v); };
    const up = () => { window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span></div>
      <div ref={trackRef} className="twk-seg" onPointerDown={onPointerDown}>
        <div className="twk-seg-thumb"
             style={{ left:`calc(2px + ${idx} * (100% - 4px) / ${n})`, width:`calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => <button key={o.value} type="button">{o.label}</button>)}
      </div>
    </div>
  );
}

function TweakButton({ label, onClick }) {
  return <button type="button" className="twk-btn" onClick={onClick}>{label}</button>;
}

Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakToggle, TweakRadio, TweakButton });
</script>

<!-- ── data ── -->
<script type="text/babel">
const CATEGORIES = {
  pants: { id:'pants', label:'ボトムス', labelEn:'Pants', fields:[
    { key:'waist', ja:'ウエスト', short:'W', axis:'circ' },
    { key:'hip',   ja:'ヒップ',   short:'H', axis:'circ' },
    { key:'thigh', ja:'わたり幅', short:'TH', axis:'flat' },
    { key:'rise',  ja:'股上',     short:'R',  axis:'flat' },
    { key:'hem',   ja:'裾幅',     short:'HM', axis:'flat' },
    { key:'inseam',ja:'股下',     short:'IN', axis:'flat' },
  ]},
  tops: { id:'tops', label:'トップス', labelEn:'Tops', fields:[
    { key:'shoulder', ja:'肩幅',   short:'S',  axis:'flat' },
    { key:'chest',    ja:'身幅',   short:'C',  axis:'flat' },
    { key:'length',   ja:'着丈',   short:'L',  axis:'flat' },
    { key:'sleeve',   ja:'袖丈',   short:'SL', axis:'flat' },
    { key:'cuff',     ja:'袖口',   short:'CF', axis:'flat' },
    { key:'neck',     ja:'首回り', short:'N',  axis:'circ' },
  ]},
  outer: { id:'outer', label:'アウター', labelEn:'Outer', fields:[
    { key:'shoulder', ja:'肩幅', short:'S',  axis:'flat' },
    { key:'chest',    ja:'身幅', short:'C',  axis:'flat' },
    { key:'length',   ja:'着丈', short:'L',  axis:'flat' },
    { key:'sleeve',   ja:'袖丈', short:'SL', axis:'flat' },
    { key:'hem',      ja:'裾幅', short:'HM', axis:'flat' },
  ]},
};

const DEFAULT_WARDROBE = [];

const EMPTY_DRAFT = { category:'pants', brand:'', sizeLabel:'', baseId:null, measures:{} };

const TOLERANCE = {
  waist:{ fit:2, loose:5, major:9 }, hip:{ fit:2, loose:5, major:9 },
  chest:{ fit:2, loose:5, major:9 }, neck:{ fit:1, loose:2, major:4 },
  shoulder:{ fit:1.5, loose:3, major:5 }, thigh:{ fit:1.5, loose:3, major:5 },
  rise:{ fit:1.5, loose:3, major:5 }, hem:{ fit:2, loose:4, major:6 },
  cuff:{ fit:1, loose:2, major:4 }, length:{ fit:2, loose:5, major:9 },
  sleeve:{ fit:2, loose:4, major:7 }, inseam:{ fit:2, loose:4, major:7 },
};

function estimateField(category, key, measures) {
  const m = measures || {};
  if (category === 'pants') {
    if (key === 'thigh' && m.hip) return +(m.hip * 0.305).toFixed(1);
    if (key === 'hem' && m.thigh) return +(m.thigh * 0.6).toFixed(1);
    if (key === 'rise' && m.waist) return +(m.waist * 0.30).toFixed(1);
    if (key === 'inseam') return 80;
    if (key === 'waist' && m.hip) return +(m.hip * 0.85).toFixed(1);
    if (key === 'hip' && m.waist) return +(m.waist * 1.18).toFixed(1);
  }
  if (category === 'tops' || category === 'outer') {
    if (key === 'shoulder' && m.chest) return +(m.chest * 0.83).toFixed(1);
    if (key === 'chest' && m.shoulder) return +(m.shoulder * 1.21).toFixed(1);
    if (key === 'sleeve') return category === 'outer' ? 62 : 60;
    if (key === 'length') return 68;
    if (key === 'cuff' && m.sleeve) return 9.5;
    if (key === 'neck' && m.chest) return +(m.chest * 0.34).toFixed(1);
  }
  return null;
}

function compareItem(baseGarment, candidate) {
  const cat = CATEGORIES[baseGarment.category];
  if (!cat) return [];
  return cat.fields.map(f => {
    const base = baseGarment.measures?.[f.key];
    let target = candidate.measures?.[f.key];
    let estimated = false;
    if (target === undefined || target === null || target === '') {
      const est = estimateField(candidate.category, f.key, candidate.measures);
      if (est !== null) { target = est; estimated = true; }
    }
    if (base == null || target == null) return { ...f, base, target, diff:null, status:'missing', estimated };
    const diff = +(target - base).toFixed(1);
    const tol = TOLERANCE[f.key] || { fit:2, loose:4, major:7 };
    const abs = Math.abs(diff);
    let status;
    if (abs <= tol.fit) status = 'fit';
    else if (abs <= tol.loose) status = diff > 0 ? 'slightly-loose' : 'slightly-tight';
    else if (abs <= tol.major) status = diff > 0 ? 'loose' : 'tight';
    else status = diff > 0 ? 'too-loose' : 'too-tight';
    return { ...f, base, target, diff, status, estimated };
  });
}

function verdict(rows) {
  const valid = rows.filter(r => r.diff != null);
  if (!valid.length) return { label:'判定不可', score:null, summary:'サイズ情報が足りません', tone:'neutral' };
  let score = 100, majorCount = 0, looseCount = 0, tightCount = 0;
  valid.forEach(r => {
    const tol = TOLERANCE[r.key] || { fit:2, loose:4, major:7 };
    const abs = Math.abs(r.diff);
    if (abs <= tol.fit) score -= 0;
    else if (abs <= tol.loose) score -= 4;
    else if (abs <= tol.major) score -= 10;
    else { score -= 18; majorCount++; }
    if (r.diff > tol.fit) looseCount++;
    if (r.diff < -tol.fit) tightCount++;
  });
  score = Math.max(0, Math.round(score));
  let label, tone, summary;
  if (score >= 88) { label='ぴったり'; tone='ok'; summary='ジャストとほぼ同寸。安心して買えます。'; }
  else if (score >= 70 && looseCount > tightCount) { label='少しゆるめ'; tone='soft'; summary='リラックスフィット寄り。ゆとりが好みなら◎'; }
  else if (score >= 70 && tightCount > looseCount) { label='少しタイト'; tone='soft'; summary='細身寄り。試着できると安心。'; }
  else if (score >= 50 && looseCount > tightCount) { label='ゆるい'; tone='warn'; summary='オーバーサイズ寄り。シルエットが大きく変わります。'; }
  else if (score >= 50 && tightCount > looseCount) { label='タイト'; tone='warn'; summary='締め付け感が出やすいサイズ感です。'; }
  else { label='サイズ差大'; tone='bad'; summary='ジャストとは別物のシルエットになります。'; }
  return { label, score, summary, tone, majorCount, looseCount, tightCount, valid:valid.length };
}

function calloutText(diff, axis) {
  if (diff == null) return null;
  const sign = diff > 0 ? '+' : '−';
  const abs = Math.abs(diff).toFixed(diff % 1 === 0 ? 0 : 1);
  let qual = '';
  if (Math.abs(diff) < 1.2) qual = 'ジャスト';
  else if (diff > 0 && Math.abs(diff) < 4) qual = 'ややゆとり';
  else if (diff > 0) qual = 'ゆったり';
  else if (Math.abs(diff) < 4) qual = 'ややタイト';
  else qual = 'タイト';
  return { headline:`${sign}${abs}cm`, qual };
}

window.fittoData = { CATEGORIES, DEFAULT_WARDROBE, EMPTY_DRAFT, TOLERANCE, estimateField, compareItem, verdict, calloutText };
</script>

<!-- ── llm (Gemini via google.script.run) ── -->
<script type="text/babel">
async function callLLM(prompt) {
  return new Promise((resolve, reject) => {
    if (typeof google === 'undefined' || !google.script) {
      reject(new Error('google.script が利用できません。Google Apps Script 上で実行してください。'));
      return;
    }
    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler((e) => reject(new Error(e.message || 'AI呼び出しに失敗しました')))
      .callGemini(prompt);
  });
}

async function parseSizeTable(rawText, hintCategory = null) {
  const fieldMap = {
    pants:  ['waist','hip','thigh','rise','hem','inseam'],
    tops:   ['shoulder','chest','length','sleeve','cuff','neck'],
    outer:  ['shoulder','chest','length','sleeve','hem'],
  };
  const prompt = `あなたはアパレルECサイトのサイズ表を構造化するアシスタントです。
以下のテキストから、商品の寸法を読み取り、JSONで返してください。

【出力スキーマ】
{
  "category": "pants" | "tops" | "outer",
  "sizes": [
    {
      "sizeLabel": "S, M, 46, F など",
      "measures": {
        // pants:  waist, hip, thigh, rise, hem, inseam
        // tops:   shoulder, chest, length, sleeve, cuff, neck
        // outer:  shoulder, chest, length, sleeve, hem
        // 値は cm の数値のみ（単位記号なし）
      },
      "isRange": false
    }
  ],
  "confidence": "high" | "medium" | "low",
  "notes": "曖昧だった点や仮定があれば短く"
}

【マッピングのルール】
- pants:
  - 「ウエスト」「胴回り」「ウェスト」→ waist
  - 「ヒップ」「腰回り」→ hip
  - 「もも幅」「わたり幅」「腿幅」「ワタリ」→ thigh
  - 「もも周り」など周径表記 → ÷2 して thigh（notesに明記）
  - 「股上」「ライズ」→ rise
  - 「股下」「インシーム」→ inseam
  - 「裾幅」「すそ幅」→ hem
  - 「裾周り」など周径表記 → ÷2 して hem（notesに明記）
  - 「ヒザ幅」「膝幅」→ 無視
- tops/outer: 「肩幅」→ shoulder, 「身幅」→ chest, 「着丈」→ length, 「袖丈」→ sleeve, 「袖口」→ cuff, 「首回り」→ neck
- 単位がinch表記の場合は cm に換算（1 inch = 2.54 cm）
- サイズ表記が複数ある場合は全部 sizes 配列に入れる
- 範囲表記は中央値を採用し isRange: true
${hintCategory ? `- ヒント: ユーザーは現在「${hintCategory}」カテゴリを選んでいます。` : ''}

【入力テキスト】
${rawText}

JSONのみを返してください。前後の説明文は不要です。`;

  let text = await callLLM(prompt);
  text = String(text).trim().replace(/^```(?:json)?\s*/i,'').replace(/\s*```$/,'').trim();
  let parsed;
  try { parsed = JSON.parse(text); }
  catch (e) {
    const m = text.match(/\{[\s\S]*\}/);
    if (m) { try { parsed = JSON.parse(m[0]); } catch { throw new Error('JSON parse failed'); } }
    else throw new Error('No JSON found in response');
  }
  const cat = ['pants','tops','outer'].includes(parsed.category) ? parsed.category : (hintCategory || 'pants');
  const allowed = fieldMap[cat] || [];
  let rawSizes = Array.isArray(parsed.sizes) ? parsed.sizes : null;
  if (!rawSizes && parsed.measures) rawSizes = [{ sizeLabel:parsed.sizeLabel, measures:parsed.measures, isRange:false }];
  rawSizes = rawSizes || [];
  const sizes = rawSizes.map(s => {
    const measures = {};
    Object.entries(s.measures || {}).forEach(([k, v]) => {
      if (allowed.includes(k)) { const num = typeof v === 'number' ? v : parseFloat(v); if (!isNaN(num)) measures[k] = +num.toFixed(1); }
    });
    return { sizeLabel: s.sizeLabel ? String(s.sizeLabel) : '', measures, isRange: !!s.isRange };
  }).filter(s => Object.keys(s.measures).length > 0);
  return { category:cat, sizes, confidence:['high','medium','low'].includes(parsed.confidence) ? parsed.confidence : 'medium', notes:parsed.notes ? String(parsed.notes) : undefined };
}

async function callLLMWithImage(base64Data, mimeType) {
  return new Promise((resolve, reject) => {
    if (typeof google === 'undefined' || !google.script) {
      reject(new Error('google.script が利用できません。Google Apps Script 上で実行してください。'));
      return;
    }
    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler((e) => reject(new Error(e.message || '画像AI呼び出しに失敗しました')))
      .callGeminiWithImage(base64Data, mimeType);
  });
}

async function parseSizeTableFromImage(base64Data, mimeType, hintCategory = null) {
  const fieldMap = {
    pants:  ['waist','hip','thigh','rise','hem','inseam'],
    tops:   ['shoulder','chest','length','sleeve','cuff','neck'],
    outer:  ['shoulder','chest','length','sleeve','hem'],
  };
  let text = await callLLMWithImage(base64Data, mimeType);
  text = String(text).trim().replace(/^```(?:json)?\s*/i,'').replace(/\s*```$/,'').trim();
  let parsed;
  try { parsed = JSON.parse(text); }
  catch (e) {
    const m = text.match(/\{[\s\S]*\}/);
    if (m) { try { parsed = JSON.parse(m[0]); } catch { throw new Error('JSON parse failed'); } }
    else throw new Error('No JSON found in response');
  }
  const cat = ['pants','tops','outer'].includes(parsed.category) ? parsed.category : (hintCategory || 'pants');
  const allowed = fieldMap[cat] || [];
  let rawSizes = Array.isArray(parsed.sizes) ? parsed.sizes : null;
  if (!rawSizes && parsed.measures) rawSizes = [{ sizeLabel:parsed.sizeLabel, measures:parsed.measures, isRange:false }];
  rawSizes = rawSizes || [];
  const sizes = rawSizes.map(s => {
    const measures = {};
    Object.entries(s.measures || {}).forEach(([k, v]) => {
      if (allowed.includes(k)) { const num = typeof v === 'number' ? v : parseFloat(v); if (!isNaN(num)) measures[k] = +num.toFixed(1); }
    });
    return { sizeLabel: s.sizeLabel ? String(s.sizeLabel) : '', measures, isRange: !!s.isRange };
  }).filter(s => Object.keys(s.measures).length > 0);
  return { category:cat, sizes, confidence:['high','medium','low'].includes(parsed.confidence) ? parsed.confidence : 'medium', notes:parsed.notes ? String(parsed.notes) : undefined };

function PantsOverlay({ accent='#1c1c1c', highlight='#6b7c5a' }) {

      <path d="M70 168 Q100 162 130 168 L132 174 Q100 170 68 174 Z" fill="#f6f4ee" stroke={accent} />
      <path d="M68 174 L62 250 L60 320 L56 352 L80 354 L88 320 L94 260 L100 200 L106 260 L112 320 L120 354 L144 352 L140 320 L138 250 L132 174 Z" fill="#fbfaf6" stroke={accent} />

function TopsOverlay({ accent='#1c1c1c', highlight='#6b7c5a' }) {

      <path d="M88 76 Q100 84 112 76" stroke={accent} />

      <path d="M58 132 Q100 126 142 132" stroke={highlight} strokeWidth="1.6" />
      <path d="M152 138 L160 132" stroke={highlight} strokeWidth="1.6" />

}

function OuterOverlay({ accent='#1c1c1c', highlight='#6b7c5a' }) {
  return (
    <g fill="none" stroke={accent} strokeWidth="1.4" strokeLinejoin="round">
      <path d="M62 78 Q100 70 138 78 L160 100 L172 200 L160 220 L148 200 L148 280 L140 290 L100 290 L60 290 L52 280 L52 200 L40 220 L28 200 L40 100 Z" fill="#fbfaf6" stroke={accent} />
      <path d="M100 76 L100 290" stroke={accent} strokeDasharray="2 3" opacity="0.5" />
      <path d="M62 80 Q100 72 138 80" stroke={highlight} strokeWidth="1.6" />
      <path d="M52 200 L148 200" stroke={highlight} strokeWidth="1.6" />
      <path d="M60 290 L140 290" stroke={highlight} strokeWidth="1.6" />
    </g>
  );
}

function Callout({ x, y, ax, ay, headline, qual, side='left', tone='fit' }) {
  const toneColor = { fit:'#1c1c1c', loose:'#6b7c5a', tight:'#b86a4a', major:'#b86a4a' }[tone] || '#1c1c1c';
  const w = 96, h = qual ? 44 : 28;
  const px = side === 'left' ? x - w - 18 : x + 18;
  const py = y - h / 2;
  return (
    <g>
      <line x1={ax} y1={ay} x2={x} y2={y} stroke="#9c9893" strokeWidth="0.8" strokeDasharray="1.5 2" />
      <circle cx={ax} cy={ay} r="2.4" fill="#6b7c5a" />
      <g transform={`translate(${px} ${py})`}>
        <rect x="0" y="0" width={w} height={h} rx="3" fill="#ffffff" stroke="#cdcac3" strokeWidth="0.8" />
        <text x={w/2} y={qual ? 16 : 18} textAnchor="middle"
              fontFamily='"Noto Sans JP",system-ui' fontSize="11" fontWeight="500" fill={toneColor}>{headline}</text>
        {qual && <text x={w/2} y={32} textAnchor="middle"
              fontFamily='"Noto Sans JP",system-ui' fontSize="10" fontWeight="400" fill="#4a4a4a">{qual}</text>}
      </g>
    </g>
  );
}

const ANCHORS = {
  pants: {
    waist:  { ax:100, ay:170, x:38,  y:150, side:'left' },
    hip:    { ax:100, ay:196, x:162, y:200, side:'right' },
    thigh:  { ax:96,  ay:230, x:38,  y:244, side:'left' },
    rise:   { ax:100, ay:184, x:162, y:158, side:'right' },
    hem:    { ax:70,  ay:350, x:36,  y:326, side:'left' },
    inseam: { ax:100, ay:280, x:162, y:296, side:'right' },
  },
  tops: {
    shoulder: { ax:100, ay:78,  x:38,  y:60,  side:'left' },
    chest:    { ax:100, ay:130, x:38,  y:138, side:'left' },
    length:   { ax:100, ay:222, x:162, y:230, side:'right' },
    sleeve:   { ax:152, ay:138, x:162, y:110, side:'right' },
    cuff:     { ax:152, ay:144, x:162, y:168, side:'right' },
    neck:     { ax:100, ay:76,  x:162, y:50,  side:'right' },
  },
  outer: {
    shoulder: { ax:100, ay:78,  x:38,  y:60,  side:'left' },
    chest:    { ax:100, ay:130, x:38,  y:130, side:'left' },
    length:   { ax:100, ay:290, x:162, y:280, side:'right' },
    sleeve:   { ax:168, ay:200, x:162, y:168, side:'right' },
    hem:      { ax:100, ay:290, x:38,  y:250, side:'left' },
  },
};

function FigureCompare({ category, rows=[], showLabels=true, height=360 }) {
  const Overlay = category === 'tops' ? TopsOverlay : category === 'outer' ? OuterOverlay : PantsOverlay;
  return (
    <svg viewBox="0 0 200 380" width="100%" style={{ display:'block', maxHeight:height }}>
      <BodySilhouette />
      <Overlay />
      {showLabels && rows.map((r) => {
        if (r.diff == null) return null;
        const a = ANCHORS[category]?.[r.key];
        if (!a) return null;
        const c = calloutText(r.diff, r.axis);
        if (!c) return null;
        const tol = window.fittoData.TOLERANCE[r.key] || { fit:2, loose:4, major:7 };
        const abs = Math.abs(r.diff);
        let tone = 'fit';
        if (abs > tol.major) tone = 'major';
        else if (abs > tol.fit) tone = r.diff > 0 ? 'loose' : 'tight';
        return <Callout key={r.key} ax={a.ax} ay={a.ay} x={a.x} y={a.y} side={a.side}
                        headline={c.headline} qual={c.qual} tone={tone} />;
      })}
    </svg>
  );
}

function FigureSimple({ category, height=320, highlightField=null }) {
  const Overlay = category === 'tops' ? TopsOverlay : category === 'outer' ? OuterOverlay : PantsOverlay;
  return (
    <svg viewBox="0 0 200 380" width="100%" style={{ display:'block', maxHeight:height }}>
      <BodySilhouette />
      <Overlay highlight={highlightField ? '#b86a4a' : '#6b7c5a'} />
      {highlightField && ANCHORS[category]?.[highlightField] && (() => {
        const a = ANCHORS[category][highlightField];
        return (
          <g>
            <circle cx={a.ax} cy={a.ay} r="6" fill="none" stroke="#b86a4a" strokeWidth="1.4" />
            <circle cx={a.ax} cy={a.ay} r="2.5" fill="#b86a4a" />
          </g>
        );
      })()}
    </svg>
  );
}

window.fittoFigure = { FigureCompare, FigureSimple };
</script>

<script type="text/babel">
function CompareInputScreen({ wardrobe, draft, setDraft, onBack, onCompute }) {

    const num = v === '' ? undefined : parseFloat(v);
    update({ measures: { ...draft.measures, [k]: isNaN(num) ? undefined : num } });
    if (aiFilledKeys[k]) { const next = { ...aiFilledKeys }; delete next[k]; setAiFilledKeys(next); }
  };

  const onAIResult = (result, selectedSize) => {
    let nextDraft = { ...draft };
    if (result.category && result.category !== draft.category) { nextDraft.category = result.category; nextDraft.measures = {}; }
    nextDraft.measures = { ...(nextDraft.measures || {}), ...selectedSize.measures };
    if (selectedSize.sizeLabel) nextDraft.sizeLabel = selectedSize.sizeLabel;
    setDraft(nextDraft);
    setAiFilledKeys(Object.fromEntries(Object.keys(selectedSize.measures).map(k => [k, true])));
    setPasteOpen(false);
  };

  const cat = CATEGORIES[draft.category];
  const bases = wardrobe.filter(w => w.category === draft.category).sort((a, b) => (b.primary?1:0) - (a.primary?1:0));
  const baseId = draft.baseId || bases[0]?.id;

  React.useEffect(() => {
    if (!draft.baseId && bases[0]) update({ baseId: bases[0].id });
  }, [draft.category]);

  const suggestions = cat.fields
    .filter(f => draft.measures?.[f.key] === undefined || draft.measures?.[f.key] === null)
    .map(f => ({ ...f, estimate: estimateField(draft.category, f.key, draft.measures || {}) }))
    .filter(s => s.estimate !== null);

  const filledCount = cat.fields.filter(f => draft.measures?.[f.key] != null).length;
  const canCompute = filledCount >= 2 && baseId;

  return (
    <>
    <Chrome title="サイズを入力" leading={<NavBtn onClick={onBack}>‹ 戻る</NavBtn>}
      trailing={<NavBtn ghost onClick={() => update({ measures:{}, brand:'', sizeLabel:'' })}>クリア</NavBtn>}>
      <div style={{ padding:'8px 22px 16px' }}>
        <FieldLabel>欲しい服</FieldLabel>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:1, background:'#e8e6e2', border:'1px solid #e8e6e2', marginBottom:16 }}>
          {Object.values(CATEGORIES).map(c => {
            const sel = draft.category === c.id;
            return (
              <button key={c.id} onClick={() => update({ category:c.id, measures:{}, baseId:null })} style={{ appearance:'none', border:'none', cursor:'pointer',

              </button>
            );
          })}
        </div>
        <TextField label="ブランド・商品名" placeholder="例：Lemaire — Twisted Pants" value={draft.brand||''} onChange={v => update({ brand:v })} />
        <TextField label="サイズ表記" placeholder="例：46, M" value={draft.sizeLabel||''} onChange={v => update({ sizeLabel:v })} />

        <button onClick={() => setPasteOpen(true)} style={{ appearance:'none', cursor:'pointer', fontFamily:'inherit',
          width:'100%', padding:'12px 14px', marginTop:6, background:'#ffffff', border:'1px dashed #cdcac3',
          borderRadius:2, color:'#1c1c1c', textAlign:'left', display:'flex', alignItems:'center', gap:10 }}>
          <span style={{ width:22, height:22, borderRadius:'50%', background:'#1c1c1c', color:'#faf8f4',
            display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, fontFamily:'"Cormorant Garamond",serif' }}>AI</span>
          <span style={{ flex:1 }}>
            <span style={{ display:'block', fontSize:12, fontWeight:500 }}>サイズ表を貼り付けて自動入力</span>
            <span style={{ display:'block', fontSize:10, color:'#8a8a8a', marginTop:2 }}>ECサイトのサイズ表をコピペすると、項目を読み取ります</span>
          </span>
          <span style={{ fontSize:14, color:'#cdcac3' }}>›</span>
        </button>
      </div>

      <div style={{ padding:'0 22px 16px' }}>
        <FieldLabel>比べる相手（基準）</FieldLabel>
        <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
          {bases.length === 0 && <div style={{ padding:14, border:'1px dashed #d8d6d2', fontSize:12, color:'#8a8a8a', textAlign:'center' }}>このカテゴリの基準が未登録です。設定から登録してください。</div>}
          {bases.map(b => {
            const sel = baseId === b.id;
            return (
              <button key={b.id} onClick={() => update({ baseId:b.id })} style={{ appearance:'none', textAlign:'left',
                display:'flex', alignItems:'center', gap:12, padding:'12px 14px', cursor:'pointer',
                background:sel?'#1c1c1c':'#ffffff', color:sel?'#faf8f4':'#1c1c1c',
                border:`1px solid ${sel?'#1c1c1c':'#e8e6e2'}`, fontFamily:'inherit' }}>
                <span style={{ fontSize:12, opacity:sel?1:0.6 }}>{b.primary?'★':'·'}</span>
                <span style={{ flex:1 }}>
                  <span style={{ display:'block', fontSize:13, fontWeight:500 }}>{b.name}</span>
                  <span style={{ display:'block', fontSize:10, color:sel?'rgba(250,248,244,0.7)':'#8a8a8a' }}>{b.brand} · size {b.sizeLabel}</span>
                </span>
                <span style={{ fontSize:16, opacity:0.5 }}>{sel?'●':'○'}</span>
              </button>
            );
          })}
        </div>
      </div>

      <div style={{ padding:'0 22px 8px' }}>
        <div style={{ display:'flex', alignItems:'baseline', justifyContent:'space-between', marginBottom:6 }}>
          <FieldLabel>商品の寸法（cm）</FieldLabel>
          <div style={{ fontSize:10, color:'#8a8a8a' }}>{filledCount}/{cat.fields.length} 入力済</div>
        </div>
        <div style={{ background:'#ffffff', border:'1px solid #ececec' }}>
          {cat.fields.map((f, i) => {
            const v = draft.measures?.[f.key];
            const missing = v == null;
            const est = missing ? estimateField(draft.category, f.key, draft.measures||{}) : null;
            return (
              <div key={f.key} style={{ display:'flex', alignItems:'center', padding:'12px 14px',
                borderBottom: i < cat.fields.length - 1 ? '1px solid #f0eee9' : 'none' }}>
                <div style={{ width:22, height:22, borderRadius:'50%', border:'1px solid #d8d6d2',
                  display:'flex', alignItems:'center', justifyContent:'center',
                  fontSize:9, color:'#8a8a8a', marginRight:12, fontFamily:'"Cormorant Garamond",serif' }}>{f.short}</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13, color:'#1c1c1c', display:'flex', alignItems:'center', gap:6 }}>

                      <span style={{ fontSize:9, letterSpacing:'0.1em', color:'#1c1c1c',
                        border:'1px solid #1c1c1c', padding:'1px 5px', fontFamily:'"Cormorant Garamond",serif' }}>AI</span>
                    )}
                  </div>
                  {missing && est != null && (
                    <button onClick={() => updateMeasure(f.key, est)} style={{ appearance:'none', border:'none',

                      fontSize:10, color:'#b86a4a', fontFamily:'inherit' }}>推定 {est}cm を使う ›</button>

                <input type="number" inputMode="decimal" step="0.5" value={v??''} placeholder="—"

function PasteSizeTableModal({ hintCategory, onClose, onResult }) {
  const [tab, setTab] = React.useState('text');
  const [text, setText] = React.useState('');
  const [imageData, setImageData] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [preview, setPreview] = React.useState(null);
  const [selectedIdx, setSelectedIdx] = React.useState(0);
  const fileInputRef = React.useRef(null);
  const pasteAreaRef = React.useRef(null);

  const resetPreview = () => { setPreview(null); setError(null); setSelectedIdx(0); };

  const processImageFile = (file) => {
    if (!file || !file.type.startsWith('image/')) { setError('画像ファイルを選択してください'); return; }
    resetPreview();
    const reader = new FileReader();
    reader.onload = (e) => {
      const dataUrl = e.target.result;
      const base64 = dataUrl.split(',')[1];
      setImageData({ base64, mimeType: file.type, preview: dataUrl });
    };
    reader.readAsDataURL(file);
  };

  React.useEffect(() => {
    if (tab !== 'image' || !pasteAreaRef.current) return;
    const el = pasteAreaRef.current;
    const onPaste = (e) => {
      const items = e.clipboardData?.items || [];
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          e.preventDefault();
          processImageFile(item.getAsFile());
          return;
        }
      }
    };
    el.addEventListener('paste', onPaste);
    return () => el.removeEventListener('paste', onPaste);
  }, [tab]);

  const onParse = async () => {
    if (!text.trim()) return;
    setLoading(true); setError(null); setPreview(null);
    try {
      const result = await window.fittoLLM.parseSizeTable(text, hintCategory);
      setPreview(result); setSelectedIdx(0);
    } catch (e) { setError(e.message || '読み取りに失敗しました'); }
    finally { setLoading(false); }
  };

  const onParseImage = async () => {
    if (!imageData) return;
    setLoading(true); setError(null); setPreview(null);
    try {
      const result = await window.fittoLLM.parseSizeTableFromImage(imageData.base64, imageData.mimeType, hintCategory);
      setPreview(result); setSelectedIdx(0);
    } catch (e) { setError(e.message || '画像の読み取りに失敗しました'); }
    finally { setLoading(false); }
  };

  const fieldJa = { waist:'ウエスト', hip:'ヒップ', thigh:'もも幅', rise:'股上', hem:'裾幅', inseam:'股下',
    shoulder:'肩幅', chest:'身幅', length:'着丈', sleeve:'袖丈', cuff:'袖口', neck:'首回り' };
  const catLabel = { pants:'ボトムス', tops:'トップス', outer:'アウター' };
  const selected = preview?.sizes?.[selectedIdx];

  const tabStyle = (active) => ({
    flex:1, appearance:'none', border:'none', borderBottom: active ? '2px solid #1c1c1c' : '2px solid transparent',
    background:'transparent', padding:'8px 0', fontSize:12, fontWeight:active?600:400,
    color: active ? '#1c1c1c' : '#8a8a8a', cursor:'pointer', fontFamily:'inherit', letterSpacing:'0.04em'
  });

  return (
    <div style={{ position:'absolute', inset:0, zIndex:100, background:'rgba(28,28,28,0.45)',
      display:'flex', alignItems:'flex-end', justifyContent:'center' }}>
      <div style={{ width:'100%', background:'#faf8f4', borderTopLeftRadius:16, borderTopRightRadius:16,
        padding:'14px 18px 22px', maxHeight:'92%', overflowY:'auto' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            <span style={{ width:22, height:22, borderRadius:'50%', background:'#1c1c1c', color:'#faf8f4',
              display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, fontFamily:'"Cormorant Garamond",serif' }}>AI</span>
            <div style={{ fontFamily:'"Cormorant Garamond","Noto Sans JP",serif', fontSize:18, fontWeight:500, color:'#1c1c1c' }}>AIでサイズを読み取る</div>
          </div>
          <button onClick={onClose} style={{ appearance:'none', border:'none', background:'transparent', fontSize:13, color:'#8a8a8a', cursor:'pointer', padding:4 }}>閉じる</button>
        </div>

        <div style={{ display:'flex', borderBottom:'1px solid #e8e6e2', marginBottom:14 }}>
          <button style={tabStyle(tab==='text')} onClick={() => { setTab('text'); resetPreview(); }}>テキスト</button>
          <button style={tabStyle(tab==='image')} onClick={() => { setTab('image'); resetPreview(); }}>画像</button>
        </div>

        {tab === 'text' && (
          <>
            <div style={{ fontSize:11, color:'#4a4a4a', lineHeight:1.7, marginBottom:10 }}>ECサイトのサイズ表をコピーしてペーストしてください。</div>
            <textarea value={text} onChange={(e) => setText(e.target.value)}
              placeholder={'例：\nサイズ  ウエスト  ヒップ  股上  股下  もも幅  裾幅\nS      78      101    26    60    29    15.5'}
              style={{ width:'100%', minHeight:140, padding:'10px 12px', border:'1px solid #e8e6e2', borderRadius:2,
                fontSize:12, fontFamily:'ui-monospace,"SF Mono",Menlo,monospace', color:'#1c1c1c',
                background:'#ffffff', resize:'vertical', outline:'none', boxSizing:'border-box' }} />
          </>
        )}

        {tab === 'image' && (
          <>
            <div style={{ fontSize:11, color:'#4a4a4a', lineHeight:1.7, marginBottom:10 }}>
              サイズ表の画像を読み込んでください。スクリーンショットのペースト、カメラ撮影、ファイル選択が使えます。
            </div>
            <div ref={pasteAreaRef} tabIndex={0}
              onDragOver={(e) => e.preventDefault()}
              onDrop={(e) => { e.preventDefault(); processImageFile(e.dataTransfer.files[0]); }}
              style={{ width:'100%', minHeight:140, border:'1px dashed #cdcac3', borderRadius:2, background:'#ffffff',
                display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
                gap:10, boxSizing:'border-box', outline:'none', cursor:'default',
                overflow:'hidden', position:'relative' }}>
              {imageData ? (
                <>
                  <img src={imageData.preview} alt="" style={{ maxWidth:'100%', maxHeight:200, objectFit:'contain' }} />
                  <button onClick={() => setImageData(null)} style={{ appearance:'none', border:'none', background:'rgba(28,28,28,0.6)', color:'#fff',
                    padding:'4px 10px', borderRadius:999, fontSize:11, cursor:'pointer', fontFamily:'inherit' }}>削除</button>
                </>
              ) : (
                <>
                  <div style={{ fontSize:11, color:'#8a8a8a', textAlign:'center', lineHeight:1.8 }}>
                    ここに画像をペースト<br/>またはドロップ
                  </div>
                  <button onClick={() => fileInputRef.current?.click()} style={{ appearance:'none', cursor:'pointer', fontFamily:'inherit',
                    padding:'8px 18px', background:'#1c1c1c', color:'#faf8f4', border:'none', borderRadius:2, fontSize:12 }}>
                    カメラ / ファイルを選択
                  </button>
                </>
              )}
            </div>
            <input ref={fileInputRef} type="file" accept="image/*" capture="environment"
              style={{ display:'none' }} onChange={(e) => processImageFile(e.target.files?.[0])} />
          </>
        )}
        {error && <div style={{ marginTop:10, padding:'10px 12px', background:'#fbf3ee', border:'1px solid #e8c7b6', color:'#b86a4a', fontSize:11, lineHeight:1.6 }}>{error}</div>}
        {preview && (
          <div style={{ marginTop:12, padding:'12px 14px', background:'#ffffff', border:'1px solid #ececec' }}>
            <div style={{ display:'flex', gap:8, alignItems:'baseline', marginBottom:8 }}>
              <div style={{ fontSize:10, letterSpacing:'0.18em', color:'#8a8a8a', textTransform:'uppercase' }}>読み取り結果</div>
              <div style={{ flex:1, height:1, background:'#e8e6e2' }} />
              <div style={{ fontSize:10, color:'#8a8a8a' }}>信頼度: {preview.confidence}</div>
            </div>
            <div style={{ fontSize:12, color:'#1c1c1c', marginBottom:10 }}><span style={{ color:'#8a8a8a' }}>カテゴリ: </span>{catLabel[preview.category]}</div>
            {preview.sizes.length > 1 && (
              <div style={{ marginBottom:10 }}>
                <div style={{ fontSize:10, letterSpacing:'0.16em', color:'#8a8a8a', textTransform:'uppercase', marginBottom:6 }}>使うサイズを選択</div>
                <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
                  {preview.sizes.map((s, i) => {
                    const sel = selectedIdx === i;
                    return (
                      <button key={i} onClick={() => setSelectedIdx(i)} style={{ appearance:'none', cursor:'pointer', fontFamily:'inherit',
                        padding:'6px 14px', fontSize:12, fontWeight:500,
                        background:sel?'#1c1c1c':'#ffffff', color:sel?'#faf8f4':'#1c1c1c',
                        border:`1px solid ${sel?'#1c1c1c':'#d8d6d2'}`, borderRadius:999 }}>
                        {s.sizeLabel||`#${i+1}`}{s.isRange&&<span style={{ marginLeft:4, opacity:0.6, fontSize:10 }}>±</span>}
                      </button>
                    );
                  })}
                </div>
              </div>
            )}
            {selected && (
              <div style={{ display:'flex', flexWrap:'wrap', gap:6, marginBottom:10 }}>
                {Object.entries(selected.measures).map(([k, v]) => (
                  <span key={k} style={{ fontSize:11, padding:'4px 10px', background:'#f3f0ea', color:'#1c1c1c', borderRadius:999, fontVariantNumeric:'tabular-nums' }}>
                    {fieldJa[k]||k} {v}cm
                  </span>
                ))}
                {Object.keys(selected.measures).length === 0 && <span style={{ fontSize:11, color:'#b86a4a' }}>項目を読み取れませんでした</span>}
              </div>
            )}
            {preview.notes && <div style={{ fontSize:10, color:'#8a8a8a', lineHeight:1.6 }}>※ {preview.notes}</div>}
          </div>
        )}
        <div style={{ display:'flex', gap:10, marginTop:14 }}>
          <button onClick={onClose} style={{ appearance:'none', cursor:'pointer', flex:1, background:'transparent',
            color:'#1c1c1c', border:'1px solid #d8d6d2', borderRadius:2, padding:'12px 16px', fontSize:13, fontFamily:'inherit' }}>キャンセル</button>
          {!preview ? (
            tab === 'text' ? (
              <button onClick={onParse} disabled={loading||!text.trim()} style={{ appearance:'none', cursor:loading?'default':'pointer', flex:2,
                background:loading||!text.trim()?'#cdcac3':'#1c1c1c', color:'#faf8f4', border:'none', borderRadius:2,
                padding:'12px 16px', fontSize:13, fontWeight:500, letterSpacing:'0.06em', fontFamily:'inherit' }}>
                {loading?'読み取り中…':'AIで読み取る'}
              </button>
            ) : (
              <button onClick={onParseImage} disabled={loading||!imageData} style={{ appearance:'none', cursor:loading?'default':'pointer', flex:2,
                background:loading||!imageData?'#cdcac3':'#1c1c1c', color:'#faf8f4', border:'none', borderRadius:2,
                padding:'12px 16px', fontSize:13, fontWeight:500, letterSpacing:'0.06em', fontFamily:'inherit' }}>
                {loading?'解析中…':'画像を解析する'}
              </button>
            )
          ) : (
            <button onClick={() => onResult(preview, selected)}
              disabled={!selected||Object.keys(selected.measures).length===0} style={{ appearance:'none', cursor:'pointer', flex:2,
              background:!selected||Object.keys(selected.measures).length===0?'#cdcac3':'#1c1c1c',
              color:'#faf8f4', border:'none', borderRadius:2, padding:'12px 16px', fontSize:13, fontWeight:500,
              letterSpacing:'0.06em', fontFamily:'inherit' }}>このサイズで入力する</button>
          )}
        </div>
      </div>
    </div>
  );
}

window.fittoScreens.CompareInputScreen = CompareInputScreen;
</script>

<script type="text/babel">
function ResultScreen({ base, candidate, judgementUI, showLabels, onBack, onSave, onChangeBase }) {
  const { Chrome, NavBtn, PrimaryBtn, GhostBtn, VerdictPill } = window.fittoUI;
  const { compareItem, verdict, TOLERANCE } = window.fittoData;
  const { FigureCompare } = window.fittoFigure;
  const cat = CATEGORIES[candidate.category];
  const rows = compareItem(base, candidate);
  const v = verdict(rows);

  return (
    <Chrome title="比較結果" leading={<NavBtn onClick={onBack}>‹ 戻る</NavBtn>} trailing={<NavBtn ghost onClick={onSave}>保存</NavBtn>}>
      <div style={{ padding:'6px 22px 10px' }}>
        <div style={{ display:'flex', alignItems:'stretch', gap:8, fontSize:11, color:'#8a8a8a' }}>
          <button onClick={onChangeBase} style={{ appearance:'none', border:'1px solid #e8e6e2', background:'#ffffff',
            flex:1, padding:'10px 12px', textAlign:'left', cursor:'pointer', fontFamily:'inherit' }}>
            <div style={{ fontSize:9, letterSpacing:'0.18em', color:'#8a8a8a', textTransform:'uppercase' }}>BASE ★</div>
            <div style={{ fontSize:12, color:'#1c1c1c', fontWeight:500, marginTop:3, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{base.name}</div>
            <div style={{ fontSize:10, color:'#8a8a8a', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{base.brand} · {base.sizeLabel}</div>
          </button>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'center', width:30, fontSize:18, color:'#cdcac3', fontFamily:'"Cormorant Garamond",serif' }}>↔</div>
          <div style={{ background:'#1c1c1c', color:'#faf8f4', flex:1, padding:'10px 12px' }}>
            <div style={{ fontSize:9, letterSpacing:'0.18em', color:'rgba(250,248,244,0.6)', textTransform:'uppercase' }}>CANDIDATE</div>
            <div style={{ fontSize:12, fontWeight:500, marginTop:3, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{candidate.brand||'商品名未設定'}</div>
            <div style={{ fontSize:10, color:'rgba(250,248,244,0.6)' }}>size {candidate.sizeLabel||'—'}</div>
          </div>
        </div>
      </div>

      <div style={{ margin:'4px 12px 0', padding:'8px 0', background:'#fbfaf6', borderTop:'1px solid #ececec', borderBottom:'1px solid #ececec', position:'relative' }}>
        <FigureCompare category={candidate.category} rows={rows} showLabels={showLabels} height={360} />
        <div style={{ position:'absolute', bottom:12, left:0, right:0, display:'flex', flexDirection:'column', alignItems:'center', gap:6 }}>
          <div style={{ fontSize:10, letterSpacing:'0.2em', color:'#8a8a8a', textTransform:'uppercase' }}>Verdict</div>
          <VerdictPill tone={v.tone}>{v.label}</VerdictPill>
        </div>
      </div>

      <div style={{ padding:'18px 22px 4px' }}>
        {judgementUI === 'label' && <VerdictLabelView v={v} />}
        {judgementUI === 'score' && <VerdictScoreView v={v} rows={rows} />}
        {judgementUI === 'breakdown' && <VerdictBreakdownView v={v} rows={rows} cat={cat} />}
        {(judgementUI === 'all' || !judgementUI) && (
          <>
            <VerdictLabelView v={v} compact />
            <VerdictScoreView v={v} rows={rows} compact />
            <VerdictBreakdownView v={v} rows={rows} cat={cat} />
          </>
        )}
      </div>

      <div style={{ padding:'20px 22px 28px', display:'flex', gap:10 }}>
        <GhostBtn onClick={onBack}>サイズを直す</GhostBtn>
        <PrimaryBtn onClick={onSave}>保存して戻る</PrimaryBtn>
      </div>
    </Chrome>
  );
}

function VerdictLabelView({ v, compact=false }) {
  const { VerdictPill } = window.fittoUI;
  const conf = v.score == null ? '—' : v.score >= 88 ? '高' : v.score >= 70 ? '中' : '低';
  return (
    <div style={{ background:'#ffffff', border:'1px solid #ececec', padding:compact?'14px 16px':'20px 18px', marginBottom:compact?12:0 }}>
      <div style={{ display:'flex', alignItems:'baseline', gap:10, marginBottom:8 }}>
        <div style={{ fontSize:10, letterSpacing:'0.18em', color:'#8a8a8a', textTransform:'uppercase' }}>判定</div>
        <div style={{ flex:1, height:1, background:'#e8e6e2' }} />
        <div style={{ fontSize:10, color:'#8a8a8a' }}>信頼度 {conf}</div>
      </div>
      <div style={{ fontFamily:'"Cormorant Garamond","Noto Sans JP",serif', fontSize:compact?28:36, fontWeight:500, lineHeight:1.1, color:'#1c1c1c', marginBottom:8 }}>{v.label}</div>
      <div style={{ fontSize:12, lineHeight:1.7, color:'#4a4a4a', marginBottom:10 }}>{v.summary}</div>
      <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
        {v.tightCount > 0 && <VerdictPill tone="warn" small>タイト {v.tightCount}箇所</VerdictPill>}
        {v.looseCount > 0 && <VerdictPill tone="soft" small>ゆとり {v.looseCount}箇所</VerdictPill>}
        {v.majorCount > 0 && <VerdictPill tone="bad" small>差大 {v.majorCount}箇所</VerdictPill>}
        {v.tightCount === 0 && v.looseCount === 0 && <VerdictPill tone="ok" small>全項目ジャスト</VerdictPill>}
      </div>
    </div>
  );
}

function VerdictScoreView({ v, rows, compact=false }) {
  const { TOLERANCE } = window.fittoData;
  const score = v.score ?? 0;
  const r = 36, c = 2 * Math.PI * r, dash = (score / 100) * c;
  const stroke = { ok:'#1c1c1c', soft:'#6b7c5a', warn:'#b86a4a', bad:'#8a3a1c' }[v.tone] || '#cdcac3';
  return (
    <div style={{ background:'#ffffff', border:'1px solid #ececec', padding:compact?'14px 16px':'20px 18px',
      marginBottom:compact?12:0, display:'flex', alignItems:'center', gap:18 }}>
      <div style={{ position:'relative', width:92, height:92, flexShrink:0 }}>
        <svg width="92" height="92" viewBox="0 0 92 92">
          <circle cx="46" cy="46" r={r} fill="none" stroke="#ececec" strokeWidth="3" />
          <circle cx="46" cy="46" r={r} fill="none" stroke={stroke} strokeWidth="3"
            strokeDasharray={`${dash} ${c}`} strokeLinecap="butt" transform="rotate(-90 46 46)" />
        </svg>
        <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column' }}>
          <div style={{ fontFamily:'"Cormorant Garamond",serif', fontSize:30, fontWeight:500, color:'#1c1c1c', lineHeight:1 }}>{score}</div>
          <div style={{ fontSize:9, letterSpacing:'0.16em', color:'#8a8a8a', textTransform:'uppercase', marginTop:2 }}>fit score</div>
        </div>
      </div>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ fontSize:10, letterSpacing:'0.18em', color:'#8a8a8a', textTransform:'uppercase', marginBottom:4 }}>スコア内訳</div>
        <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
          {[
            { label:'ジャスト', count:rows.filter(r => r.status==='fit').length, color:'#1c1c1c' },
            { label:'ゆとり', count:rows.filter(r => r.diff!=null && r.diff > (TOLERANCE[r.key]?.fit||2)).length, color:'#6b7c5a' },
            { label:'タイト', count:rows.filter(r => r.diff!=null && r.diff < -(TOLERANCE[r.key]?.fit||2)).length, color:'#b86a4a' },
          ].map(({ label, count, color }) => {
            const total = rows.filter(r => r.diff!=null).length;
            const pct = total ? (count/total)*100 : 0;
            return (
              <div key={label} style={{ display:'flex', alignItems:'center', gap:8 }}>
                <div style={{ width:50, fontSize:10, color:'#4a4a4a' }}>{label}</div>
                <div style={{ flex:1, height:4, background:'#f3f0ea', position:'relative' }}>
                  <div style={{ position:'absolute', inset:0, width:`${pct}%`, background:color }} />
                </div>
                <div style={{ width:24, fontSize:10, color:'#8a8a8a', textAlign:'right', fontVariantNumeric:'tabular-nums' }}>{count}</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function VerdictBreakdownView({ v, rows, cat }) {
  return (
    <div style={{ background:'#ffffff', border:'1px solid #ececec' }}>
      <div style={{ padding:'12px 16px 10px', borderBottom:'1px solid #ececec', display:'flex', alignItems:'baseline', gap:10 }}>
        <div style={{ fontSize:10, letterSpacing:'0.18em', color:'#8a8a8a', textTransform:'uppercase' }}>項目別の差分</div>
        <div style={{ flex:1, height:1, background:'#e8e6e2' }} />
        <div style={{ fontSize:10, color:'#8a8a8a' }}>{v.valid}/{cat.fields.length}項目</div>
      </div>
      {rows.map((r, i) => {
        const { TOLERANCE } = window.fittoData;
        const tol = TOLERANCE[r.key] || { fit:2, loose:4, major:7 };
        const labelMap = {
          fit:{ ja:'ジャスト', tone:'ok' }, 'slightly-loose':{ ja:'ややゆるい', tone:'soft' },
          'slightly-tight':{ ja:'ややタイト', tone:'soft' }, loose:{ ja:'ゆるい', tone:'warn' },
          tight:{ ja:'タイト', tone:'warn' }, 'too-loose':{ ja:'差大（ゆるい）', tone:'bad' },
          'too-tight':{ ja:'差大（タイト）', tone:'bad' }, missing:{ ja:'データなし', tone:'neutral' },
        };
        const tag = labelMap[r.status] || labelMap.missing;
        const dotColor = { ok:'#1c1c1c', soft:'#6b7c5a', warn:'#b86a4a', bad:'#8a3a1c', neutral:'#cdcac3' }[tag.tone];
        const range = tol.major + 2;
        const pct = r.diff == null ? 50 : Math.max(0, Math.min(100, 50 + (r.diff/range)*50));
        return (
          <div key={r.key} style={{ padding:'12px 16px', borderBottom: i === rows.length-1 ? 'none' : '1px solid #f0eee9' }}>
            <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:6 }}>
              <div style={{ width:22, height:22, borderRadius:'50%', border:'1px solid #d8d6d2',
                display:'flex', alignItems:'center', justifyContent:'center',
                fontSize:9, color:'#8a8a8a', fontFamily:'"Cormorant Garamond",serif' }}>{r.short}</div>
              <div style={{ fontSize:12, fontWeight:500, color:'#1c1c1c' }}>{r.ja}</div>
              {r.estimated && <span style={{ fontSize:9, letterSpacing:'0.1em', color:'#b86a4a', border:'1px solid #e8c7b6', padding:'1px 5px' }}>推定</span>}
              <div style={{ flex:1 }} />
              <div style={{ fontSize:11, fontVariantNumeric:'tabular-nums', color:'#8a8a8a' }}>
                {r.base??'—'}<span style={{ margin:'0 4px' }}>→</span>
                <span style={{ color:'#1c1c1c', fontWeight:500 }}>{r.target??'—'}</span><span style={{ marginLeft:4 }}>cm</span>
              </div>
            </div>
            <div style={{ position:'relative', height:4, background:'#f3f0ea', marginLeft:32, marginBottom:6 }}>
              <div style={{ position:'absolute', left:'50%', top:-2, bottom:-2, width:1, background:'#cdcac3' }} />
              <div style={{ position:'absolute', top:0, bottom:0, left:`${50-(tol.fit/range)*50}%`, width:`${(tol.fit*2/range)*50}%`, background:'#e8e6e2' }} />
              {r.diff != null && <div style={{ position:'absolute', top:-3, height:10, width:2, left:`${pct}%`, transform:'translateX(-1px)', background:dotColor }} />}
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:8, marginLeft:32 }}>
              <span style={{ width:6, height:6, borderRadius:'50%', background:dotColor }} />
              <span style={{ fontSize:11, color:'#1c1c1c' }}>{tag.ja}</span>
              {r.diff != null && <span style={{ fontSize:11, color:'#8a8a8a', fontVariantNumeric:'tabular-nums', marginLeft:'auto' }}>{r.diff>0?'+':''}{r.diff.toFixed(1)}cm</span>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

window.fittoScreens.ResultScreen = ResultScreen;
</script>

<!-- ── app ── -->
<script type="text/babel">
const { DEFAULT_WARDROBE, EMPTY_DRAFT } = window.fittoData;
const { HomeScreen, SetupListScreen, SetupEditScreen, CompareInputScreen, ResultScreen } = window.fittoScreens;

function useLocalStorage(key, defaultValue) {
  const [value, setValue] = React.useState(() => {
    try {
      const stored = localStorage.getItem(key);
      return stored ? JSON.parse(stored) : defaultValue;
    } catch { return defaultValue; }
  });
  const set = React.useCallback((v) => {
    setValue(prev => {
      const next = typeof v === 'function' ? v(prev) : v;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      return next;
    });
  }, [key]);
  return [value, set];
}

function App() {
  const [t, setTweak] = useTweaks(window.TWEAK_DEFAULTS);
  const [wardrobe, setWardrobe] = useLocalStorage('fitto_wardrobe', DEFAULT_WARDROBE);
  const [history, setHistory]   = useLocalStorage('fitto_history', []);
  const [screen, setScreen]     = React.useState('home');
  const [draft, setDraft] = React.useState({ ...EMPTY_DRAFT });
  const [editTarget, setEditTarget] = React.useState(null);

  const baseGarment = wardrobe.find(w => w.id === draft.baseId)
    || wardrobe.find(w => w.category === draft.category && w.primary)
    || wardrobe.find(w => w.category === draft.category);

  const onSaveItem = (item) => {
    setWardrobe(ws => {
      const idx = ws.findIndex(w => w.id === item.id);
      let next = idx >= 0 ? (next = ws.slice(), next[idx] = item, next) : [...ws, item];
      if (item.primary) next = next.map(w => w.category === item.category && w.id !== item.id ? { ...w, primary:false } : w);
      return next;
    });
    setScreen('setup');
  };

  const onTogglePrimary = (id) => {
    setWardrobe(ws => {
      const target = ws.find(w => w.id === id);
      if (!target) return ws;
      return ws.map(w => {
        if (w.id === id) return { ...w, primary:!w.primary };
        if (w.category === target.category && !target.primary) return { ...w, primary:false };
        return w;
      });
    });
  };

  const onSaveResult = () => {
    const { compareItem, verdict } = window.fittoData;
    const v = verdict(compareItem(baseGarment, draft));
    const newH = { id:'h'+Date.now(), category:draft.category,
      brand:(draft.brand||'').split(' — ')[0]||draft.brand||'無題',
      product:(draft.brand||'').split(' — ')[1]||draft.sizeLabel||'',
      date:'今日', baseName:baseGarment?.name||'', label:v.label, tone:v.tone };
    setHistory(h => [newH, ...h]);
    setScreen('home');
  };

  let screenEl;
  if (screen === 'home') {
    screenEl = <HomeScreen wardrobe={wardrobe} history={history} onCompare={() => setScreen('compare')}
      onSetup={() => setScreen('setup')} onItem={(w) => { setEditTarget(w); setScreen('edit'); }} />;
  } else if (screen === 'compare') {
    screenEl = <CompareInputScreen wardrobe={wardrobe} draft={draft} setDraft={setDraft}
      onBack={() => setScreen('home')} onCompute={() => setScreen('result')} />;
  } else if (screen === 'result') {
    screenEl = baseGarment ? <ResultScreen base={baseGarment} candidate={draft}
      judgementUI={t.judgementUI} showLabels={t.showLabels}
      onBack={() => setScreen('compare')} onSave={onSaveResult} onChangeBase={() => setScreen('compare')} /> : null;
  } else if (screen === 'setup') {
    screenEl = <SetupListScreen wardrobe={wardrobe} onBack={() => setScreen('home')}
      onAdd={() => { setEditTarget(null); setScreen('edit'); }}
      onEdit={(item) => { setEditTarget(item); setScreen('edit'); }}
      onTogglePrimary={onTogglePrimary} />;
  } else if (screen === 'edit') {
    screenEl = <SetupEditScreen initial={editTarget} onBack={() => setScreen('setup')} onSave={onSaveItem} />;
  }

  return (
    <>
      <style>{`
        @keyframes fitto-fade { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
        #root { height: 100%; }
        #fitto-app { display:flex; flex-direction:column; height:100%; min-height:100dvh;
          background:var(--paper);
          padding-top:env(safe-area-inset-top);
          padding-bottom:env(safe-area-inset-bottom);
          padding-left:env(safe-area-inset-left);
          padding-right:env(safe-area-inset-right); }
        #fitto-screen { flex:1; min-height:0; display:flex; flex-direction:column; overflow:hidden; }
        #fitto-screen > div { flex:1; min-height:0; }
      `}</style>
      <div id="fitto-app">
        <div id="fitto-screen">
          <div key={screen} style={{ width:'100%', height:'100%', display:'flex', flexDirection:'column', animation:'fitto-fade 220ms ease' }}>
            {screenEl}
          </div>
        </div>
      </div>

      <TweaksPanel>
        <TweakSection label="判定UIのバリエーション" />
        <TweakRadio label="表示" value={t.judgementUI}
          options={[{value:'all',label:'全部入り'},{value:'label',label:'ラベル'},{value:'score',label:'スコア'},{value:'breakdown',label:'項目別'}]}
          onChange={(v) => setTweak('judgementUI', v)} />
        <TweakSection label="図のラベル" />
        <TweakToggle label="吹き出しを表示" value={t.showLabels} onChange={(v) => setTweak('showLabels', v)} />
        <TweakSection label="ジャンプ" />
        <TweakButton label="ホーム" onClick={() => setScreen('home')} />
        <TweakButton label="比較入力" onClick={() => setScreen('compare')} />
        <TweakButton label="結果画面" onClick={() => setScreen('result')} />
        <TweakButton label="ジャストの服一覧" onClick={() => setScreen('setup')} />
        <TweakButton label="新規登録" onClick={() => { setEditTarget(null); setScreen('edit'); }} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

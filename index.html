<!-- ── tweaks-panel ── -->
<script type="text/babel">
const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
    max-height:calc(100vh - 32px);display:flex;flex-direction:column;
    background:rgba(250,249,247,.78);color:#29261b;
    -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);
    border:.5px solid rgba(255,255,255,.6);border-radius:14px;
    box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);
    font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;
    padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
    width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;
    overflow-y:auto;min-height:0}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-sect:first-child{padding-top:0}
  .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;background:rgba(0,0,0,.06);user-select:none}
  .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;
    background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);transition:left .15s,width .15s}
  .twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;
    background:transparent;color:inherit;font:inherit;font-weight:500;min-height:22px;
    border-radius:6px;cursor:default;padding:4px 6px}
  .twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;
    background:rgba(0,0,0,.15);transition:background .15s;cursor:default;padding:0}
  .twk-toggle[data-on="1"]{background:#34c759}
  .twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;
    background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}
  .twk-toggle[data-on="1"] i{transform:translateX(14px)}
  .twk-btn{appearance:none;height:26px;padding:0 12px;border:0;border-radius:7px;
    background:rgba(0,0,0,.78);color:#fff;font:inherit;font-weight:500;cursor:default}
  .twk-btn:hover{background:rgba(0,0,0,.88)}
`;

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      panel.style.right = Math.max(16, offsetRef.current.x) + 'px';
      panel.style.bottom = Math.max(16, offsetRef.current.y) + 'px';
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onClick={() => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); }}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label }) {
  return <div className="twk-sect">{label}</div>;
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const trackRef = React.useRef(null);
  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const i = Math.floor(((clientX - r.left - 2) / (r.width - 4)) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };
  const onPointerDown = (e) => {
    const v0 = segAt(e.clientX);
    if (v0 !== value) onChange(v0);
    const move = (ev) => { const v = segAt(ev.clientX); if (v !== value) onChange(v); };
    const up = () => { window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span></div>
      <div ref={trackRef} className="twk-seg" onPointerDown={onPointerDown}>
        <div className="twk-seg-thumb"
             style={{ left:`calc(2px + ${idx} * (100% - 4px) / ${n})`, width:`calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => <button key={o.value} type="button">{o.label}</button>)}
      </div>
    </div>
  );
}

function TweakButton({ label, onClick }) {
  return <button type="button" className="twk-btn" onClick={onClick}>{label}</button>;
}

Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakToggle, TweakRadio, TweakButton });
</script>

<!-- ── data ── -->
<script type="text/babel">
const CATEGORIES = {
  pants: { id:'pants', label:'ボトムス', labelEn:'Pants', fields:[
    { key:'waist', ja:'ウエスト', short:'W', axis:'circ' },
    { key:'hip',   ja:'ヒップ',   short:'H', axis:'circ' },
    { key:'thigh', ja:'わたり幅', short:'TH', axis:'flat' },
    { key:'rise',  ja:'股上',     short:'R',  axis:'flat' },
    { key:'hem',   ja:'裾幅',     short:'HM', axis:'flat' },
    { key:'inseam',ja:'股下',     short:'IN', axis:'flat' },
  ]},
  tops: { id:'tops', label:'トップス', labelEn:'Tops', fields:[
    { key:'shoulder', ja:'肩幅',   short:'S',  axis:'flat' },
    { key:'chest',    ja:'身幅',   short:'C',  axis:'flat' },
    { key:'length',   ja:'着丈',   short:'L',  axis:'flat' },
    { key:'sleeve',   ja:'袖丈',   short:'SL', axis:'flat' },
    { key:'cuff',     ja:'袖口',   short:'CF', axis:'flat' },
    { key:'neck',     ja:'首回り', short:'N',  axis:'circ' },
  ]},
  outer: { id:'outer', label:'アウター', labelEn:'Outer', fields:[
    { key:'shoulder', ja:'肩幅', short:'S',  axis:'flat' },
    { key:'chest',    ja:'身幅', short:'C',  axis:'flat' },
    { key:'length',   ja:'着丈', short:'L',  axis:'flat' },
    { key:'sleeve',   ja:'袖丈', short:'SL', axis:'flat' },
    { key:'hem',      ja:'裾幅', short:'HM', axis:'flat' },
  ]},
};

const DEFAULT_WARDROBE = [];

const EMPTY_DRAFT = { category:'pants', brand:'', baseId:null, sizes:[] };
// sizes: [{ id, sizeLabel, measures: { ... } }]

const TOLERANCE = {
  waist:{ fit:2, loose:5, major:9 }, hip:{ fit:2, loose:5, major:9 },
  chest:{ fit:2, loose:5, major:9 }, neck:{ fit:1, loose:2, major:4 },
  shoulder:{ fit:1.5, loose:3, major:5 }, thigh:{ fit:1.5, loose:3, major:5 },
  rise:{ fit:1.5, loose:3, major:5 }, hem:{ fit:2, loose:4, major:6 },
  cuff:{ fit:1, loose:2, major:4 }, length:{ fit:2, loose:5, major:9 },
  sleeve:{ fit:2, loose:4, major:7 }, inseam:{ fit:2, loose:4, major:7 },
};

// Importance weight per measurement key (higher = affects fit comfort more)
const MEASURE_WEIGHTS = {
  waist:3.0, hip:2.5, thigh:2.0, inseam:2.0, rise:1.5, hem:1.0,
  shoulder:3.0, chest:2.5, length:2.0, sleeve:1.5, neck:1.5, cuff:1.0,
};

function estimateField(category, key, measures) {
  const m = measures || {};
  if (category === 'pants') {
    if (key === 'thigh' && m.hip) return +(m.hip * 0.305).toFixed(1);
    if (key === 'hem' && m.thigh) return +(m.thigh * 0.6).toFixed(1);
    if (key === 'rise' && m.waist) return +(m.waist * 0.30).toFixed(1);
    if (key === 'inseam') return 80;
    if (key === 'waist' && m.hip) return +(m.hip * 0.85).toFixed(1);
    if (key === 'hip' && m.waist) return +(m.waist * 1.18).toFixed(1);
  }
  if (category === 'tops' || category === 'outer') {
    if (key === 'shoulder' && m.chest) return +(m.chest * 0.83).toFixed(1);
    if (key === 'chest' && m.shoulder) return +(m.shoulder * 1.21).toFixed(1);
    if (key === 'sleeve') return category === 'outer' ? 62 : 60;
    if (key === 'length') return 68;
    if (key === 'cuff' && m.sleeve) return 9.5;
    if (key === 'neck' && m.chest) return +(m.chest * 0.34).toFixed(1);
  }
  return null;
}

function compareItem(baseGarment, candidate) {
  const cat = CATEGORIES[baseGarment.category];
  if (!cat) return [];
  return cat.fields.map(f => {
    const base = baseGarment.measures?.[f.key];
    let target = candidate.measures?.[f.key];
    let estimated = false;
    if (target === undefined || target === null || target === '') {
      const est = estimateField(candidate.category, f.key, candidate.measures);
      if (est !== null) { target = est; estimated = true; }
    }
    if (base == null || target == null) return { ...f, base, target, diff:null, status:'missing', estimated };
    const diff = +(target - base).toFixed(1);
    const tol = TOLERANCE[f.key] || { fit:2, loose:4, major:7 };
    const abs = Math.abs(diff);
    let status;
    if (abs <= tol.fit) status = 'fit';
    else if (abs <= tol.loose) status = diff > 0 ? 'slightly-loose' : 'slightly-tight';
    else if (abs <= tol.major) status = diff > 0 ? 'loose' : 'tight';
    else status = diff > 0 ? 'too-loose' : 'too-tight';
    return { ...f, base, target, diff, status, estimated };
  });
}

function verdict(rows) {
  const valid = rows.filter(r => r.diff != null);
  if (!valid.length) return { label:'判定不可', score:null, summary:'サイズ情報が足りません', tone:'neutral' };

  let weightedScore = 0, totalWeight = 0;
  let looseCount = 0, tightCount = 0, majorCount = 0;

  valid.forEach(r => {
    const tol = TOLERANCE[r.key] || { fit:2, loose:4, major:7 };
    const w   = MEASURE_WEIGHTS[r.key] || 1.5;
    const abs = Math.abs(r.diff);

    // Continuous penalty [0–100] within this measurement (no cliffs)
    let penalty;
    if (abs <= tol.fit) {
      penalty = 0;
    } else if (abs <= tol.loose) {
      penalty = 25 * (abs - tol.fit) / (tol.loose - tol.fit);
    } else if (abs <= tol.major) {
      penalty = 25 + 50 * (abs - tol.loose) / (tol.major - tol.loose);
    } else {
      penalty = Math.min(100, 75 + 25 * (abs - tol.major) / tol.major);
    }
    // Tight hurts slightly more than loose (physical discomfort)
    if (r.diff < 0) penalty = Math.min(100, penalty * 1.15);

    weightedScore += (100 - penalty) * w;
    totalWeight   += w;

    if (r.diff > tol.fit)  looseCount++;
    if (r.diff < -tol.fit) tightCount++;
    if (abs > tol.major)   majorCount++;
  });

  // Normalized 0–100, comparable across garments with different measurement counts
  const score = Math.max(0, Math.round(weightedScore / totalWeight));

  const dom = looseCount > tightCount ? 'loose' : tightCount > looseCount ? 'tight' : 'mixed';
  let label, tone, summary;
  if (score >= 88) {
    label='ぴったり'; tone='ok'; summary='ジャストとほぼ同寸。安心して買えます。';
  } else if (score >= 72) {
    if (dom === 'loose') { label='やや大きめ'; tone='soft'; summary='全体的にゆとりがある仕上がりです。'; }
    else if (dom === 'tight') { label='やや小さめ'; tone='soft'; summary='全体的に少し細身な仕上がりです。'; }
    else { label='やや差あり'; tone='soft'; summary='部位によって差があります。試着確認を。'; }
  } else if (score >= 52) {
    if (dom === 'loose') { label='大きめ'; tone='warn'; summary='ゆとりが多め。シルエットが変わります。'; }
    else if (dom === 'tight') { label='小さめ'; tone='warn'; summary='締め付け感が出やすいサイズ感です。'; }
    else { label='差あり'; tone='warn'; summary='複数箇所でサイズ差があります。'; }
  } else {
    if (dom === 'loose') { label='かなり大きめ'; tone='bad'; summary='ジャストとは別物のシルエットになります。'; }
    else if (dom === 'tight') { label='かなり小さめ'; tone='bad'; summary='ジャストとは別物のシルエットになります。'; }
    else { label='サイズ差大'; tone='bad'; summary='ジャストとは別物のシルエットになります。'; }
  }
  return { label, score, summary, tone, majorCount, looseCount, tightCount, valid:valid.length };
}

function calloutText(diff, axis) {
  if (diff == null) return null;
  const sign = diff > 0 ? '+' : '−';
  const abs = Math.abs(diff).toFixed(diff % 1 === 0 ? 0 : 1);
  let qual = '';
  if (Math.abs(diff) < 1.2) qual = 'ジャスト';
  else if (diff > 0 && Math.abs(diff) < 4) qual = 'ややゆとり';
  else if (diff > 0) qual = 'ゆったり';
  else if (Math.abs(diff) < 4) qual = 'ややタイト';
  else qual = 'タイト';
  return { headline:`${sign}${abs}cm`, qual };
}

window.fittoData = { CATEGORIES, DEFAULT_WARDROBE, EMPTY_DRAFT, TOLERANCE, MEASURE_WEIGHTS, estimateField, compareItem, verdict, calloutText };
</script>

<!-- ── llm (Gemini via google.script.run) ── -->
<script type="text/babel">
async function callLLM(prompt) {
  return new Promise((resolve, reject) => {
    if (typeof google === 'undefined' || !google.script) {
      reject(new Error('google.script が利用できません。Google Apps Script 上で実行してください。'));
      return;
    }
    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler((e) => reject(new Error(e.message || 'AI呼び出しに失敗しました')))
      .callGemini(prompt);
  });
}

async function parseSizeTable(rawText, hintCategory = null) {
  const fieldMap = {
    pants:  ['waist','hip','thigh','rise','hem','inseam'],
    tops:   ['shoulder','chest','length','sleeve','cuff','neck'],
    outer:  ['shoulder','chest','length','sleeve','hem'],
  };
  const prompt = `あなたはアパレルECサイトのサイズ表を構造化するアシスタントです。
以下のテキストから、商品の寸法を読み取り、JSONで返してください。

【出力スキーマ】
{
  "category": "pants" | "tops" | "outer",
  "sizes": [
    {
      "sizeLabel": "S, M, 46, F など",
      "measures": {
        // pants:  waist, hip, thigh, rise, hem, inseam
        // tops:   shoulder, chest, length, sleeve, cuff, neck
        // outer:  shoulder, chest, length, sleeve, hem
        // 値は cm の数値のみ（単位記号なし）
      },
      "isRange": false
    }
  ],
  "confidence": "high" | "medium" | "low",
  "notes": "曖昧だった点や仮定があれば短く"
}

【マッピングのルール】
- pants:
  - 「ウエスト」「胴回り」「ウェスト」→ waist
  - 「ヒップ」「腰回り」→ hip
  - 「もも幅」「わたり幅」「腿幅」「ワタリ」→ thigh
  - 「もも周り」など周径表記 → ÷2 して thigh（notesに明記）
  - 「股上」「ライズ」→ rise
  - 「股下」「インシーム」→ inseam
  - 「裾幅」「すそ幅」→ hem
  - 「裾周り」など周径表記 → ÷2 して hem（notesに明記）
  - 「ヒザ幅」「膝幅」→ 無視
- tops/outer: 「肩幅」→ shoulder, 「身幅」→ chest, 「着丈」→ length, 「袖丈」→ sleeve, 「袖口」→ cuff, 「首回り」→ neck
- 単位がinch表記の場合は cm に換算（1 inch = 2.54 cm）
- サイズ表記が複数ある場合は全部 sizes 配列に入れる
- 範囲表記は中央値を採用し isRange: true
${hintCategory ? `- ヒント: ユーザーは現在「${hintCategory}」カテゴリを選んでいます。` : ''}

【入力テキスト】
${rawText}

JSONのみを返してください。前後の説明文は不要です。`;

  let text = await callLLM(prompt);
  text = String(text).trim().replace(/^```(?:json)?\s*/i,'').replace(/\s*```$/,'').trim();
  let parsed;
  try { parsed = JSON.parse(text); }
  catch (e) {
    const m = text.match(/\{[\s\S]*\}/);
    if (m) { try { parsed = JSON.parse(m[0]); } catch { throw new Error('JSON parse failed'); } }
    else throw new Error('No JSON found in response');
  }
  const cat = ['pants','tops','outer'].includes(parsed.category) ? parsed.category : (hintCategory || 'pants');
  const allowed = fieldMap[cat] || [];
  let rawSizes = Array.isArray(parsed.sizes) ? parsed.sizes : null;
  if (!rawSizes && parsed.measures) rawSizes = [{ sizeLabel:parsed.sizeLabel, measures:parsed.measures, isRange:false }];
  rawSizes = rawSizes || [];
  const sizes = rawSizes.map(s => {
    const measures = {};
    Object.entries(s.measures || {}).forEach(([k, v]) => {
      if (allowed.includes(k)) { const num = typeof v === 'number' ? v : parseFloat(v); if (!isNaN(num)) measures[k] = +num.toFixed(1); }
    });
    return { sizeLabel: s.sizeLabel ? String(s.sizeLabel) : '', measures, isRange: !!s.isRange };
  }).filter(s => Object.keys(s.measures).length > 0);
  return { category:cat, sizes, confidence:['high','medium','low'].includes(parsed.confidence) ? parsed.confidence : 'medium', notes:parsed.notes ? String(parsed.notes) : undefined };
}

async function callLLMWithImage(base64Data, mimeType) {
  return new Promise((resolve, reject) => {
    if (typeof google === 'undefined' || !google.script) {
      reject(new Error('google.script が利用できません。Google Apps Script 上で実行してください。'));
      return;
    }
    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler((e) => reject(new Error(e.message || '画像AI呼び出しに失敗しました')))
      .callGeminiWithImage(base64Data, mimeType);
  });
}

async function parseSizeTableFromImage(base64Data, mimeType, hintCategory = null) {
  const fieldMap = {
    pants:  ['waist','hip','thigh','rise','hem','inseam'],
    tops:   ['shoulder','chest','length','sleeve','cuff','neck'],
    outer:  ['shoulder','chest','length','sleeve','hem'],
  };
  let text = await callLLMWithImage(base64Data, mimeType);
  text = String(text).trim().replace(/^```(?:json)?\s*/i,'').replace(/\s*```$/,'').trim();
  let parsed;
  try { parsed = JSON.parse(text); }
  catch (e) {
    const m = text.match(/\{[\s\S]*\}/);
    if (m) { try { parsed = JSON.parse(m[0]); } catch { throw new Error('JSON parse failed'); } }
    else throw new Error('No JSON found in response');
  }
  const cat = ['pants','tops','outer'].includes(parsed.category) ? parsed.category : (hintCategory || 'pants');
  const allowed = fieldMap[cat] || [];
  let rawSizes = Array.isArray(parsed.sizes) ? parsed.sizes : null;
  if (!rawSizes && parsed.measures) rawSizes = [{ sizeLabel:parsed.sizeLabel, measures:parsed.measures, isRange:false }];
  rawSizes = rawSizes || [];
  const sizes = rawSizes.map(s => {
    const measures = {};
    Object.entries(s.measures || {}).forEach(([k, v]) => {
      if (allowed.includes(k)) { const num = typeof v === 'number' ? v : parseFloat(v); if (!isNaN(num)) measures[k] = +num.toFixed(1); }
    });
    return { sizeLabel: s.sizeLabel ? String(s.sizeLabel) : '', measures, isRange: !!s.isRange };
  }).filter(s => Object.keys(s.measures).length > 0);
  return { category:cat, sizes, confidence:['high','medium','low'].includes(parsed.confidence) ? parsed.confidence : 'medium', notes:parsed.notes ? String(parsed.notes) : undefined };
}

window.fittoLLM = { parseSizeTable, parseSizeTableFromImage };
</script>

<script type="text/babel">
const { calloutText } = window.fittoData;

const GARMENT_DEFAULTS = {
  pants: { waist:84, hip:100, thigh:30, rise:25, hem:20, inseam:78 },
  tops:  { shoulder:44, chest:51, length:67, sleeve:21, cuff:17, neck:40 },
  outer: { shoulder:46, chest:55, length:90, sleeve:60, hem:55, neck:42 },
};

const VIEW_W = 200, VIEW_H = 380, PADDING = 14;

function fillMeasures(category, measures) {
  const def = GARMENT_DEFAULTS[category] || {};
  const out = {};
  Object.keys(def).forEach(k => { out[k] = measures?.[k] != null ? measures[k] : def[k]; });
  // outer also uses sleeve, length, hem from tops-like; ensure all
  if (category === 'outer') {
    if (out.length == null) out.length = 90;
    if (out.sleeve == null) out.sleeve = 60;
    if (out.cuff == null) out.cuff = 12;
  }
  return out;
}

function garmentDims(category, m) {
  if (category === 'pants') {
    const halfWaist = m.waist / 4;
    const halfHip = m.hip / 4;
    const totalLegW = m.thigh; // half-flat width of one leg at top
    const halfWidth = Math.max(halfWaist, halfHip, totalLegW); // cm from center to side
    const totalH = m.rise + m.inseam;
    return { halfWidth, totalH };
  } else {
    // tops & outer
    const hs = m.shoulder / 2;
    const hc = m.chest / 2;
    const a = (45 + Math.min(m.sleeve, 65) * 0.44) * Math.PI / 180;
    const cosA = Math.cos(a), sinA = Math.sin(a);
    const halfWidth = Math.max(hs + cosA * m.sleeve + m.cuff / 2, hc);
    const totalH = Math.max(m.length, sinA * m.sleeve + m.cuff / 2 * cosA);
    return { halfWidth, totalH };
  }
}

function commonScale(category, baseMeasures, candidateMeasures) {
  const a = garmentDims(category, fillMeasures(category, baseMeasures));
  const b = garmentDims(category, fillMeasures(category, candidateMeasures || baseMeasures));
  const maxW = Math.max(a.halfWidth, b.halfWidth) * 2;
  const maxH = Math.max(a.totalH, b.totalH);
  const sx = (VIEW_W - PADDING * 2) / Math.max(maxW, 1);
  const sy = (VIEW_H - PADDING * 2) / Math.max(maxH, 1);
  return Math.min(sx, sy);
}

// Build SVG path for garment outline
function buildPantsPath(m, scale, cx, y0) {
  const halfWaist = m.waist / 4 * scale;
  const halfHip = m.hip / 4 * scale;
  const thighW = m.thigh * scale;     // each leg outer offset from cx
  const hemW = m.hem * scale;
  const riseH = m.rise * scale;
  const inseamH = m.inseam * scale;
  const yHip = y0 + riseH * 0.55;
  const yCrotch = y0 + riseH;
  const yBot = yCrotch + inseamH;
  const cg = 1.5; // crotch gap (svg units, visual)
  return [
    `M ${cx - halfWaist} ${y0}`,
    `L ${cx + halfWaist} ${y0}`,
    `L ${cx + halfHip} ${yHip}`,
    `L ${cx + thighW} ${yCrotch}`,
    `L ${cx + hemW} ${yBot}`,
    `L ${cx + cg} ${yBot}`,
    `L ${cx} ${yCrotch}`,
    `L ${cx - cg} ${yBot}`,
    `L ${cx - hemW} ${yBot}`,
    `L ${cx - thighW} ${yCrotch}`,
    `L ${cx - halfHip} ${yHip}`,
    'Z'
  ].join(' ');
}

function buildTopsPath(m, scale, cx, y0, isOuter=false) {
  const f   = v => v.toFixed(1);
  const hs  = m.shoulder / 2 * scale;
  const hc  = m.chest    / 2 * scale;
  const lh  = m.length       * scale;
  const sl  = m.sleeve       * scale;
  const hcf = m.cuff     / 2 * scale;

  // Neck opening derived from circumference
  const nw = Math.min((m.neck / (2 * Math.PI)) * scale, hs * 0.45);
  const nd = nw * 1.0;

  // Armhole drop: ~28% of length, max 22 cm
  const armDrop = Math.min(m.length * 0.28, 22) * scale;

  // Sleeve angle: 45° (short) → ~74° (long), steeper = more downward hang
  const a    = (45 + Math.min(m.sleeve, 65) * 0.44) * Math.PI / 180;
  const cosA = Math.cos(a), sinA = Math.sin(a);

  // Right sleeve tip center
  const tipX = cx + hs + cosA * sl;
  const tipY = y0 + sinA * sl;

  // Cuff corners perpendicular to sleeve direction
  // upper (toward top of sleeve): rotate sleeve dir 90° CW → (sinA, -cosA)
  // lower (toward underside):     rotate 90° CCW → (-sinA, cosA)
  const cuX = tipX + sinA * hcf;
  const cuY = Math.max(y0 + 2, tipY - cosA * hcf);  // clamp: never above shoulder
  const clX = tipX - sinA * hcf;
  const clY = tipY + cosA * hcf;

  // Armhole corner = body side x, armhole-drop y
  const rArmX = cx + hc, rArmY = y0 + armDrop;

  return [
    `M ${f(cx - hs)} ${f(y0)}`,                               // left shoulder
    `L ${f(cx - nw)} ${f(y0)}`,
    `Q ${f(cx)} ${f(y0 + nd)} ${f(cx + nw)} ${f(y0)}`,        // neck curve
    `L ${f(cx + hs)} ${f(y0)}`,                                // right shoulder
    `L ${f(cuX)} ${f(cuY)}`,                                   // right cuff upper (outer seam)
    `L ${f(clX)} ${f(clY)}`,                                   // right cuff lower (across cuff opening)
    `L ${f(rArmX)} ${f(rArmY)}`,                               // right armhole (inner seam → body)
    `L ${f(cx + hc)} ${f(y0 + lh)}`,                          // right hem
    `L ${f(cx - hc)} ${f(y0 + lh)}`,                          // left hem
    `L ${f(cx - hc)} ${f(rArmY)}`,                             // left armhole
    `L ${f(2*cx - clX)} ${f(clY)}`,                           // left cuff lower (mirrored)
    `L ${f(2*cx - cuX)} ${f(cuY)}`,                           // left cuff upper (mirrored)
    'Z',
  ].join(' ');
}

function buildOuterFront(m, scale, cx, y0) {
  // front opening line for outer
  const lh = m.length * scale;
  const neckHalf = (m.neck / Math.PI) / 2 * scale;
  const neckDepth = neckHalf * 1.2;
  return `M ${cx} ${y0 + neckDepth} L ${cx} ${y0 + lh}`;
}

function GarmentShape({ category, measures, scale, originY=PADDING, dashed=false, stroke='#1c1c1c', fill='none', strokeWidth=1.4, opacity=1 }) {
  const cx = VIEW_W / 2;
  const m = fillMeasures(category, measures);
  const path = category === 'pants' ? buildPantsPath(m, scale, cx, originY)
    : buildTopsPath(m, scale, cx, originY, category === 'outer');
  return (
    <g opacity={opacity}>
      <path d={path} fill={fill} stroke={stroke} strokeWidth={strokeWidth}
        strokeDasharray={dashed ? '7 3' : null}
        strokeLinejoin="round" strokeLinecap="round" />
      {category === 'outer' && (
        <path d={buildOuterFront(m, scale, cx, originY)} fill="none" stroke={stroke} strokeWidth={strokeWidth*0.7}
          strokeDasharray={dashed ? '4 3' : '2 3'} opacity="0.5" />
      )}
    </g>
  );
}

// Compute anchor position (svg coords) for a given measurement key on the BASE garment
function edgeAnchor(category, key, m, scale, originY=PADDING) {
  const cx = VIEW_W / 2;
  if (category === 'pants') {
    const halfWaist = m.waist / 4 * scale;
    const halfHip = m.hip / 4 * scale;
    const thighW = m.thigh * scale;
    const hemW = m.hem * scale;
    const riseH = m.rise * scale;
    const inseamH = m.inseam * scale;
    const yHip = originY + riseH * 0.55;
    const yCrotch = originY + riseH;
    const yBot = yCrotch + inseamH;
    if (key === 'waist')  return { ax: cx + halfWaist, ay: originY,        side: 'right' };
    if (key === 'hip')    return { ax: cx + halfHip,   ay: yHip,           side: 'right' };
    if (key === 'thigh')  return { ax: cx - thighW,    ay: yCrotch,        side: 'left'  };
    if (key === 'rise')   return { ax: cx - halfWaist, ay: (originY + yCrotch)/2, side: 'left'  };
    if (key === 'hem')    return { ax: cx - hemW,      ay: yBot,           side: 'left'  };
    if (key === 'inseam') return { ax: cx + hemW * 0.4, ay: (yCrotch + yBot)/2, side:'right' };
  } else {
    const hs  = m.shoulder / 2 * scale;
    const hc  = m.chest    / 2 * scale;
    const lh  = m.length       * scale;
    const sl  = m.sleeve       * scale;
    const hcf = m.cuff     / 2 * scale;
    const a    = (45 + Math.min(m.sleeve, 65) * 0.44) * Math.PI / 180;
    const cosA = Math.cos(a), sinA = Math.sin(a);
    const tipX = cx + hs + cosA * sl;
    const tipY = originY + sinA * sl;
    const nw   = Math.min((m.neck / (2 * Math.PI)) * scale, hs * 0.45);
    const armDrop = Math.min(m.length * 0.28, 22) * scale;
    if (key === 'shoulder') return { ax: cx - hs,    ay: originY,                                  side: 'left'  };
    if (key === 'neck')     return { ax: cx + nw,    ay: originY + nw * 0.5,                       side: 'right' };
    if (key === 'sleeve')   return { ax: tipX,       ay: tipY,                                     side: 'right' };
    if (key === 'cuff')     return { ax: tipX - sinA*hcf, ay: tipY + cosA*hcf,                     side: 'right' };
    if (key === 'chest')    return { ax: cx - hc,    ay: originY + armDrop + (lh - armDrop) * 0.4, side: 'left'  };
    if (key === 'length')   return { ax: cx + hc,    ay: originY + lh,                             side: 'right' };
    if (key === 'hem')      return { ax: cx + hc,    ay: originY + lh,                             side: 'right' };
  }
  return null;
}

function Callout({ x, y, ax, ay, keyJa='', headline, qual, side='left', tone='fit' }) {
  const toneColor = { fit:'#1c1c1c', loose:'#6b7c5a', tight:'#b86a4a', major:'#b86a4a' }[tone] || '#1c1c1c';
  const w = 80;
  const h = keyJa ? (qual ? 50 : 36) : (qual ? 38 : 24);
  const px = side === 'left' ? x - w - 6 : x + 6;
  const py = y - h / 2;
  return (
    <g>
      <line x1={ax} y1={ay} x2={x} y2={y} stroke="#9c9893" strokeWidth="0.6" strokeDasharray="1.5 2" />
      <circle cx={ax} cy={ay} r="2" fill={toneColor} />
      <g transform={`translate(${px} ${py})`}>
        <rect x="0" y="0" width={w} height={h} rx="3" fill="#ffffff" stroke={toneColor} strokeWidth="0.7" opacity="0.95" />
        {keyJa && <text x={w/2} y={11} textAnchor="middle"
              fontFamily='"Noto Sans JP",system-ui' fontSize="8" fontWeight="400" fill="#8a8a8a">{keyJa}</text>}
        <text x={w/2} y={keyJa ? 26 : (qual ? 14 : 16)} textAnchor="middle"
              fontFamily='"Noto Sans JP",system-ui' fontSize="11" fontWeight="700" fill={toneColor}>{headline}</text>
        {qual && <text x={w/2} y={keyJa ? 40 : 28} textAnchor="middle"
              fontFamily='"Noto Sans JP",system-ui' fontSize="9" fontWeight="400" fill="#4a4a4a">{qual}</text>}
      </g>
    </g>
  );
}

function FigureCompare({ category, baseMeasures, candidateMeasures, rows=[], showLabels=true, height=360 }) {
  const scale = commonScale(category, baseMeasures, candidateMeasures);
  const baseM = fillMeasures(category, baseMeasures);
  const candM = fillMeasures(category, candidateMeasures || baseMeasures);

  // Vertical centering: compute actual garment height and center in viewport
  const dimA = garmentDims(category, baseM);
  const dimB = garmentDims(category, candM);
  const maxH = Math.max(dimA.totalH, dimB.totalH);
  const originY = Math.max(PADDING, (VIEW_H - maxH * scale) / 2);

  // Calloutの label位置: 配置候補 left/right を交互に
  const callouts = showLabels ? rows.map((r) => {
    if (r.diff == null) return null;
    const anchor = edgeAnchor(category, r.key, baseM, scale, originY);
    if (!anchor) return null;
    const tol = window.fittoData.TOLERANCE[r.key] || { fit:2, loose:4, major:7 };
    const abs = Math.abs(r.diff);
    const isJust = abs <= tol.fit;
    const keyJa = (CATEGORIES[category]?.fields || []).find(f => f.key === r.key)?.ja || '';
    if (isJust) {
      return { key:r.key, anchor, keyJa, headline:'ジャスト', qual:'', tone:'fit' };
    }
    const c = calloutText(r.diff, r.axis);
    if (!c) return null;
    let tone = 'fit';
    if (abs > tol.major) tone = 'major';
    else if (abs > tol.fit) tone = r.diff > 0 ? 'loose' : 'tight';
    return { key:r.key, anchor, keyJa, headline:c.headline, qual:c.qual, tone };
  }).filter(Boolean) : [];

  // Distribute callouts vertically to avoid overlap
  const sideStacks = { left: [], right: [] };
  callouts.forEach(c => sideStacks[c.anchor.side].push(c));
  ['left','right'].forEach(side => {
    sideStacks[side].sort((a, b) => a.anchor.ay - b.anchor.ay);
    sideStacks[side].forEach((c, i) => {
      const baseY = c.anchor.ay;
      // simple stacking: clamp and spread
      c.x = side === 'left' ? 8 : VIEW_W - 8;
      c.y = baseY;
    });
  });

  return (
    <svg viewBox={`0 0 ${VIEW_W} ${VIEW_H}`} width="100%" style={{ display:'block', maxHeight:height }}>
      {/* base garment - solid */}
      <GarmentShape category={category} measures={baseM} scale={scale} originY={originY}
        stroke="#1c1c1c" fill="#fbfaf6" strokeWidth={1.4} />
      {/* candidate overlay - dashed, no fill */}
      {candidateMeasures && Object.keys(candidateMeasures).length > 0 && (
        <GarmentShape category={category} measures={candM} scale={scale} originY={originY} dashed
          stroke="#b86a4a" fill="none" strokeWidth={2} opacity={0.9} />
      )}
      {callouts.map(c => (
        <Callout key={c.key} ax={c.anchor.ax} ay={c.anchor.ay} x={c.x} y={c.y} side={c.anchor.side}
          keyJa={c.keyJa} headline={c.headline} qual={c.qual} tone={c.tone} />
      ))}
    </svg>
  );
}

function FigureSimple({ category, measures, height=320, highlightField=null }) {
  const scale = commonScale(category, measures, measures);
  const m = fillMeasures(category, measures);
  const dim = garmentDims(category, m);
  const originY = Math.max(PADDING, (VIEW_H - dim.totalH * scale) / 2);
  const anchor = highlightField ? edgeAnchor(category, highlightField, m, scale, originY) : null;
  return (
    <svg viewBox={`0 0 ${VIEW_W} ${VIEW_H}`} width="100%" style={{ display:'block', maxHeight:height }}>
      <GarmentShape category={category} measures={m} scale={scale} originY={originY}
        stroke="#1c1c1c" fill="#fbfaf6" strokeWidth={1.4} />
      {anchor && (
        <g>
          <circle cx={anchor.ax} cy={anchor.ay} r="7" fill="none" stroke="#b86a4a" strokeWidth="1.4" />
          <circle cx={anchor.ax} cy={anchor.ay} r="3" fill="#b86a4a" />
        </g>
      )}
    </svg>
  );
}

window.fittoFigure = { FigureCompare, FigureSimple };
</script>

function GhostBtn({ children, onClick, full=true }) {

function SectionTitle({ kicker, children, action }) {

        {kicker && <div style={{ fontSize:11, letterSpacing:'0.18em', color:'#8a8a8a', textTransform:'uppercase', marginBottom:6 }}>{kicker}</div>}

function CategoryGlyph({ category, size=32, color='#1c1c1c' }) {
  const sw = 1.2;
  if (category === 'pants') return (
    <svg width={size} height={size} viewBox="0 0 32 32" fill="none">

  if (category === 'tops') return (

      <path d="M11 7 Q16 5 21 7 L26 11 L24 14 L22 13 L22 26 L10 26 L10 13 L8 14 L6 11 Z" stroke={color} strokeWidth={sw} strokeLinejoin="round" />

  if (category === 'outer') return (
    <svg width={size} height={size} viewBox="0 0 32 32" fill="none">
      <path d="M10 6 L22 6 L27 10 L26 18 L23 17 L23 28 L9 28 L9 17 L6 18 L5 10 Z" stroke={color} strokeWidth={sw} strokeLinejoin="round" />
      <line x1="16" y1="6" x2="16" y2="28" stroke={color} strokeWidth={sw} strokeDasharray="1.5 2" />

}

function VerdictPill({ tone, small=false, children }) {
  const palette = {
    ok:{ bg:'#1c1c1c', fg:'#faf8f4', border:'#1c1c1c' },
    soft:{ bg:'#f3f0ea', fg:'#1c1c1c', border:'#cdcac3' },

  );
}

function HomeScreen({ wardrobe, history, onCompare, onSetup, onItem }) {
  const counts = {
    pants: wardrobe.filter(w => w.category==='pants').length,
    tops:  wardrobe.filter(w => w.category==='tops').length,

  const primaryItems = wardrobe.filter(w => w.primary);
  const isEmpty = wardrobe.length === 0;

  return (
    <Chrome
      titleNode={<span style={{ fontFamily:'"Cormorant Garamond",serif', fontSize:44, fontWeight:500, letterSpacing:'0.06em', color:'#1c1c1c', lineHeight:1 }}>fitto</span>}
      leading={<NavBtn ghost>―</NavBtn>}
      trailing={<NavBtn onClick={onSetup}>設定</NavBtn>}
    >
      {isEmpty ? (
        <div style={{ padding:'40px 24px 32px', display:'flex', flexDirection:'column', alignItems:'center', textAlign:'center', gap:24 }}>
          <div style={{ width:80, height:80, background:'#f3f0ea', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center' }}>
            <CategoryGlyph category="tops" size={40} color="#8a8a8a" />

function SetupEditScreen({ initial, onBack, onSave }) {
  const { Chrome, NavBtn, PrimaryBtn } = window.fittoUI;
  const { FigureSimple } = window.fittoFigure;
  const isNew = !initial?.id;
  const [draft, setDraft] = React.useState(() => initial || {
    id: 'w' + Date.now(), category:'pants', name:'', brand:'', sizeLabel:'', primary:false, measures:{}, note:'',
  });
  const [focusedField, setFocusedField] = React.useState(null);
  const [pasteOpen, setPasteOpen] = React.useState(false);
  const cat = CATEGORIES[draft.category];
  const update = (patch) => setDraft(d => ({ ...d, ...patch }));
  const updateMeasure = (k, v) => {
    const num = v === '' ? undefined : parseFloat(v);
    setDraft(d => ({ ...d, measures: { ...d.measures, [k]: isNaN(num) ? undefined : num } }));
  };

  const onAIResult = (result, selectedSizes) => {
    if (!selectedSizes.length) { setPasteOpen(false); return; }
    const first = selectedSizes[0];
    let next = { ...draft };
    if (result.category && result.category !== draft.category) { next.category = result.category; next.measures = {}; }
    next.measures = { ...(next.measures || {}), ...first.measures };
    if (first.sizeLabel) next.sizeLabel = first.sizeLabel;
    setDraft(next);
    setPasteOpen(false);
  };

  return (
    <>
    <Chrome title={isNew?'新規登録':'編集'} leading={<NavBtn onClick={onBack}>‹ 戻る</NavBtn>} trailing={<NavBtn onClick={() => onSave(draft)}>保存</NavBtn>}>
      <div style={{ padding:'12px 24px 22px' }}>

              <button key={c.id} onClick={() => update({ category:c.id, measures:{} })} style={{ appearance:'none', border:'none', cursor:'pointer',
                padding:'18px 8px', background:sel?'#1c1c1c':'#faf8f4', color:sel?'#faf8f4':'#1c1c1c',

                <window.fittoUI.CategoryGlyph category={c.id} size={28} color={sel?'#faf8f4':'#1c1c1c'} />
                <span style={{ fontSize:13, letterSpacing:'0.06em' }}>{c.label}</span>
              </button>
            );
          })}
        </div>
      </div>

      <div style={{ margin:'0 24px 18px', padding:'14px', background:'#fbfaf6', border:'1px solid #ececec', display:'flex', alignItems:'center', gap:12 }}>
        <div style={{ width:120, flexShrink:0 }}>
          <FigureSimple category={draft.category} measures={draft.measures} highlightField={focusedField} height={200} />
        </div>
        <div style={{ flex:1, fontSize:13, lineHeight:1.7, color:'#4a4a4a' }}>
          {focusedField ? (
            <>
              <div style={{ fontSize:11, letterSpacing:'0.16em', color:'#b86a4a', marginBottom:6 }}>MEASURING</div>
              <div style={{ fontFamily:'"Cormorant Garamond",serif', fontSize:20, color:'#1c1c1c' }}>{cat.fields.find(f => f.key === focusedField)?.ja}</div>
              <div style={{ fontSize:12, color:'#8a8a8a', marginTop:6 }}>平置きで測ったサイズを入力してください。</div>
            </>
          ) : (
            <>
              <div style={{ fontSize:11, letterSpacing:'0.16em', color:'#8a8a8a', marginBottom:6 }}>{cat.labelEn.toUpperCase()}</div>
              <div style={{ fontFamily:'"Cormorant Garamond",serif', fontSize:20, color:'#1c1c1c' }}>{cat.label}の寸法</div>
              <div style={{ fontSize:12, color:'#8a8a8a', marginTop:6 }}>数値の入力欄をタップすると、図の位置がハイライトされます。</div>
            </>
          )}
        </div>
      </div>

      <div style={{ padding:'0 24px 4px' }}>
        <TextField label="呼び名" placeholder="例：ジャストパンツ" value={draft.name} onChange={v => update({ name:v })} />
        <TextField label="ブランド・型番" placeholder="例：A.P.C. Petit Standard" value={draft.brand} onChange={v => update({ brand:v })} />
        <TextField label="サイズ表記" placeholder="例：31, M, 4" value={draft.sizeLabel} onChange={v => update({ sizeLabel:v })} />
      </div>

      <div style={{ padding:'8px 24px 4px' }}>
        <button onClick={() => setPasteOpen(true)} style={{ appearance:'none', cursor:'pointer', fontFamily:'inherit',
          width:'100%', padding:'16px 18px', background:'#ffffff', border:'1px dashed #cdcac3',
          borderRadius:2, color:'#1c1c1c', textAlign:'left', display:'flex', alignItems:'center', gap:12, minHeight:64 }}>
          <span style={{ width:28, height:28, borderRadius:'50%', background:'#1c1c1c', color:'#faf8f4',
            display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, fontFamily:'"Cormorant Garamond",serif', flexShrink:0 }}>AI</span>
          <span style={{ flex:1 }}>
            <span style={{ display:'block', fontSize:14, fontWeight:500 }}>AIでサイズを自動入力</span>
            <span style={{ display:'block', fontSize:12, color:'#8a8a8a', marginTop:3 }}>サイズ表のテキストや画像から読み取ります</span>

          <div key={f.key} style={{ display:'flex', alignItems:'center', padding:'16px 18px',

            <div style={{ flex:1, fontSize:15, color:'#1c1c1c' }}>{f.ja}</div>
            <input type="number" inputMode="decimal" step="0.5"
              value={draft.measures?.[f.key] ?? ''} placeholder="—"
              onChange={(e) => updateMeasure(f.key, e.target.value)}
              onFocus={() => setFocusedField(f.key)} onBlur={() => setFocusedField(null)}
              style={{ width:88, textAlign:'right', border:'none', borderBottom:'1px solid #d8d6d2',
                background:'transparent', padding:'6px 4px', fontSize:16, fontFamily:'inherit',
                fontVariantNumeric:'tabular-nums', outline:'none' }} />
            <div style={{ width:28, fontSize:13, color:'#8a8a8a', textAlign:'right' }}>cm</div>
          </div>
        ))}
      </div>

      <div style={{ padding:'0 24px' }}>
        <FieldLabel>メモ（任意）</FieldLabel>
        <textarea value={draft.note||''} onChange={(e) => update({ note:e.target.value })}
          placeholder="例：休日用にゆとりあり"
          style={{ width:'100%', minHeight:72, padding:'12px 14px', border:'1px solid #e8e6e2',
            borderRadius:2, fontSize:14, fontFamily:'inherit', color:'#1c1c1c',
            background:'#ffffff', resize:'none', outline:'none' }} />
      </div>

      <div style={{ padding:'18px 24px 10px' }}>
        <label style={{ display:'flex', alignItems:'center', gap:12, fontSize:14, color:'#1c1c1c', cursor:'pointer', minHeight:44 }}>

            style={{ accentColor:'#1c1c1c', width:20, height:20 }} />
          このカテゴリの基準にする（★）
        </label>
      </div>
      <div style={{ padding:'18px 24px 32px' }}>
        <PrimaryBtn onClick={() => onSave(draft)}>保存する</PrimaryBtn>
      </div>

    {pasteOpen && (
      <PasteSizeTableModal hintCategory={draft.category} onClose={() => setPasteOpen(false)} onResult={onAIResult} />
    )}
    </>
  );
}

window.fittoUI.TextField = TextField;
window.fittoScreens.SetupListScreen = SetupListScreen;
window.fittoScreens.SetupEditScreen = SetupEditScreen;
</script>

<script type="text/babel">
function CompareInputScreen({ wardrobe, draft, setDraft, onBack, onCompute }) {
  const { Chrome, NavBtn, PrimaryBtn, CategoryGlyph, FieldLabel, TextField } = window.fittoUI;
  const [pasteOpen, setPasteOpen] = React.useState(false);
  const [editingSizeId, setEditingSizeId] = React.useState(null);

  const update = (patch) => setDraft({ ...draft, ...patch });
  const sizes = draft.sizes || [];

  const onAIResult = (result, selectedSizes) => {
    let nextSizes = sizes;
    let nextCategory = draft.category;
    if (result.category && result.category !== draft.category) {
      nextCategory = result.category;
      nextSizes = [];
    }
    const additions = selectedSizes.map(s => ({
      id: 's' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
      sizeLabel: s.sizeLabel || '',
      measures: { ...s.measures }
    }));
    setDraft({ ...draft, category:nextCategory, sizes:[...nextSizes, ...additions], baseId: nextCategory !== draft.category ? null : draft.baseId });
    setPasteOpen(false);
  };

  const addEmptySize = () => {
    const newSize = { id: 's' + Date.now(), sizeLabel:'', measures:{} };
    update({ sizes: [...sizes, newSize] });
    setEditingSizeId(newSize.id);
  };

  const removeSize = (id) => update({ sizes: sizes.filter(s => s.id !== id) });

  const updateSize = (id, patch) => update({ sizes: sizes.map(s => s.id === id ? { ...s, ...patch } : s) });

  const cat = CATEGORIES[draft.category];
  const bases = wardrobe.filter(w => w.category === draft.category).sort((a, b) => (b.primary?1:0) - (a.primary?1:0));
  const baseId = draft.baseId || bases[0]?.id;

  React.useEffect(() => {
    if (!draft.baseId && bases[0]) update({ baseId: bases[0].id });
  }, [draft.category]);

  const validSizes = sizes.filter(s => Object.keys(s.measures || {}).length >= 2);
  const canCompute = validSizes.length >= 1 && baseId;

  const editingSize = editingSizeId ? sizes.find(s => s.id === editingSizeId) : null;

  return (
    <>
    <Chrome title="サイズを比較" leading={<NavBtn onClick={onBack}>‹ 戻る</NavBtn>}
      trailing={<NavBtn ghost onClick={() => update({ sizes:[], brand:'' })}>クリア</NavBtn>}>
      <div style={{ padding:'12px 24px 20px' }}>
        <FieldLabel>欲しい服</FieldLabel>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:1, background:'#e8e6e2', border:'1px solid #e8e6e2', marginBottom:20 }}>
          {Object.values(CATEGORIES).map(c => {
            const sel = draft.category === c.id;
            return (
              <button key={c.id} onClick={() => update({ category:c.id, sizes:[], baseId:null })} style={{ appearance:'none', border:'none', cursor:'pointer',
                padding:'18px 8px', background:sel?'#1c1c1c':'#faf8f4', color:sel?'#faf8f4':'#1c1c1c',
                fontFamily:'inherit', display:'flex', flexDirection:'column', alignItems:'center', gap:8, minHeight:80 }}>
                <CategoryGlyph category={c.id} size={28} color={sel?'#faf8f4':'#1c1c1c'} />
                <span style={{ fontSize:13, letterSpacing:'0.06em' }}>{c.label}</span>
              </button>
            );
          })}
        </div>
        <TextField label="ブランド・商品名" placeholder="例：Lemaire — Twisted Pants" value={draft.brand||''} onChange={v => update({ brand:v })} />
      </div>

      <div style={{ padding:'0 24px 20px' }}>
        <FieldLabel>比べる基準</FieldLabel>
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {bases.length === 0 && <div style={{ padding:18, border:'1px dashed #d8d6d2', fontSize:14, color:'#8a8a8a', textAlign:'center' }}>このカテゴリの基準が未登録です。設定から登録してください。</div>}
          {bases.map(b => {
            const sel = baseId === b.id;
            return (
              <button key={b.id} onClick={() => update({ baseId:b.id })} style={{ appearance:'none', textAlign:'left',
                display:'flex', alignItems:'center', gap:14, padding:'16px 18px', cursor:'pointer',
                background:sel?'#1c1c1c':'#ffffff', color:sel?'#faf8f4':'#1c1c1c',
                border:`1px solid ${sel?'#1c1c1c':'#e8e6e2'}`, fontFamily:'inherit' }}>
                <span style={{ fontSize:14, opacity:sel?1:0.6 }}>{b.primary?'★':'·'}</span>
                <span style={{ flex:1 }}>
                  <span style={{ display:'block', fontSize:15, fontWeight:500 }}>{b.name}</span>
                  <span style={{ display:'block', fontSize:12, color:sel?'rgba(250,248,244,0.7)':'#8a8a8a', marginTop:2 }}>{b.brand} · size {b.sizeLabel}</span>
                </span>
                <span style={{ fontSize:18, opacity:0.5 }}>{sel?'●':'○'}</span>
              </button>
            );
          })}
        </div>
      </div>

      <div style={{ padding:'0 24px 12px' }}>
        <div style={{ display:'flex', alignItems:'baseline', justifyContent:'space-between' }}>
          <FieldLabel>比較するサイズ</FieldLabel>
          <div style={{ fontSize:12, color:'#8a8a8a' }}>{sizes.length}件</div>
        </div>

        <button onClick={() => setPasteOpen(true)} style={{ appearance:'none', cursor:'pointer', fontFamily:'inherit',
          width:'100%', padding:'18px 20px', marginBottom:12, background:'#ffffff', border:'1px dashed #cdcac3',
          borderRadius:2, color:'#1c1c1c', textAlign:'left', display:'flex', alignItems:'center', gap:14, minHeight:72 }}>
          <span style={{ width:36, height:36, borderRadius:'50%', background:'#1c1c1c', color:'#faf8f4',
            display:'flex', alignItems:'center', justifyContent:'center', fontSize:15, fontFamily:'"Cormorant Garamond",serif', flexShrink:0 }}>AI</span>
          <span style={{ flex:1 }}>
            <span style={{ display:'block', fontSize:15, fontWeight:500 }}>AIで一括読み取り</span>
            <span style={{ display:'block', fontSize:12, color:'#8a8a8a', marginTop:3 }}>サイズ表のテキストや画像から複数サイズをまとめて取り込み</span>
          </span>
          <span style={{ fontSize:18, color:'#cdcac3' }}>›</span>
        </button>

        {sizes.length === 0 ? (
          <div style={{ padding:'24px 18px', border:'1px dashed #d8d6d2', borderRadius:2, fontSize:13, color:'#8a8a8a', textAlign:'center', lineHeight:1.7 }}>
            まだサイズが登録されていません。<br/>AIで読み取るか、下のボタンで手動追加してください。
          </div>
        ) : (
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            {sizes.map(s => {
              const filled = Object.keys(s.measures || {}).length;
              const total = cat.fields.length;
              return (
                <div key={s.id} style={{ background:'#ffffff', border:'1px solid #e8e6e2', padding:'14px 16px',
                  display:'flex', alignItems:'center', gap:14 }}>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:16, fontWeight:500, color:'#1c1c1c', marginBottom:6 }}>
                      サイズ {s.sizeLabel || '(未設定)'}
                    </div>
                    <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
                      {filled === 0 ? (
                        <span style={{ fontSize:12, color:'#b86a4a' }}>項目未入力</span>
                      ) : (
                        cat.fields.filter(f => s.measures?.[f.key] != null).slice(0, 4).map(f => (
                          <span key={f.key} style={{ fontSize:12, padding:'3px 9px', background:'#f3f0ea', color:'#4a4a4a', borderRadius:999, fontVariantNumeric:'tabular-nums' }}>
                            {f.short} {s.measures[f.key]}
                          </span>
                        ))
                      )}
                      {filled > 4 && <span style={{ fontSize:12, color:'#8a8a8a' }}>+{filled-4}</span>}
                    </div>
                    <div style={{ fontSize:11, color:'#8a8a8a', marginTop:6 }}>{filled}/{total} 項目</div>
                  </div>
                  <button onClick={() => setEditingSizeId(s.id)} style={{ appearance:'none', border:'1px solid #d8d6d2',
                    background:'#ffffff', color:'#1c1c1c', padding:'10px 14px', fontSize:13, fontFamily:'inherit',
                    cursor:'pointer', borderRadius:2, minHeight:44 }}>編集</button>
                  <button onClick={() => removeSize(s.id)} style={{ appearance:'none', border:'none',
                    background:'transparent', color:'#b86a4a', padding:'10px 8px', fontSize:13, fontFamily:'inherit',
                    cursor:'pointer', minHeight:44 }}>削除</button>
                </div>
              );
            })}
          </div>
        )}

        <button onClick={addEmptySize} style={{ appearance:'none', cursor:'pointer', fontFamily:'inherit',
          width:'100%', padding:'14px 16px', marginTop:12, background:'transparent', border:'1px solid #d8d6d2',
          borderRadius:2, color:'#1c1c1c', fontSize:14, fontWeight:500, letterSpacing:'0.04em', minHeight:48 }}>
          ＋ サイズを手で追加
        </button>
      </div>

      <div style={{ padding:'18px 24px 32px' }}>
        <PrimaryBtn onClick={onCompute} disabled={!canCompute}>
          {validSizes.length > 1 ? `${validSizes.length}サイズを比較する` : 'このサイズで判定する'}
        </PrimaryBtn>
      </div>
    </Chrome>
    {pasteOpen && (
      <PasteSizeTableModal hintCategory={draft.category} onClose={() => setPasteOpen(false)} onResult={onAIResult} />
    )}
    {editingSize && (
      <SizeEditModal size={editingSize} category={draft.category}
        onClose={() => setEditingSizeId(null)}
        onSave={(patch) => { updateSize(editingSize.id, patch); setEditingSizeId(null); }} />
    )}
    </>
  );
}

function SizeEditModal({ size, category, onClose, onSave }) {
  const [draft, setDraft] = React.useState(() => ({ sizeLabel: size.sizeLabel || '', measures: { ...(size.measures || {}) } }));
  const cat = CATEGORIES[category];
  const { estimateField } = window.fittoData;
  const updateMeasure = (k, v) => {
    const num = v === '' ? undefined : parseFloat(v);
    setDraft(d => ({ ...d, measures: { ...d.measures, [k]: isNaN(num) ? undefined : num } }));
  };
  const suggestions = cat.fields
    .filter(f => draft.measures?.[f.key] === undefined || draft.measures?.[f.key] === null)
    .map(f => ({ ...f, estimate: estimateField(category, f.key, draft.measures || {}) }))
    .filter(s => s.estimate !== null);

  return (
    <div style={{ position:'absolute', inset:0, zIndex:100, background:'rgba(28,28,28,0.45)',
      display:'flex', alignItems:'flex-end', justifyContent:'center' }}>
      <div style={{ width:'100%', background:'#faf8f4', borderTopLeftRadius:16, borderTopRightRadius:16,
        padding:'18px 22px 24px', maxHeight:'92%', overflowY:'auto' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
          <div style={{ fontFamily:'"Cormorant Garamond","Noto Sans JP",serif', fontSize:22, fontWeight:500, color:'#1c1c1c' }}>サイズを編集</div>
          <button onClick={onClose} style={{ appearance:'none', border:'none', background:'transparent', fontSize:15, color:'#8a8a8a', cursor:'pointer', padding:8 }}>閉じる</button>
        </div>
        <div style={{ marginBottom:14 }}>
          <div style={{ fontSize:11, letterSpacing:'0.18em', color:'#8a8a8a', textTransform:'uppercase', marginBottom:8 }}>サイズ表記</div>
          <input type="text" value={draft.sizeLabel} placeholder="例：M, 46" onChange={(e) => setDraft(d => ({ ...d, sizeLabel:e.target.value }))}
            style={{ width:'100%', border:'none', borderBottom:'1px solid #d8d6d2', background:'transparent',
              padding:'12px 2px', fontSize:16, fontFamily:'inherit', color:'#1c1c1c', outline:'none' }} />
        </div>
        <div style={{ fontSize:11, letterSpacing:'0.18em', color:'#8a8a8a', textTransform:'uppercase', marginBottom:8 }}>寸法（cm）</div>
        <div style={{ background:'#ffffff', border:'1px solid #ececec', marginBottom:14 }}>
          {cat.fields.map((f, i) => (
            <div key={f.key} style={{ display:'flex', alignItems:'center', padding:'14px 16px',
              borderBottom: i < cat.fields.length - 1 ? '1px solid #f0eee9' : 'none' }}>
              <div style={{ width:28, height:28, borderRadius:'50%', border:'1px solid #d8d6d2',
                display:'flex', alignItems:'center', justifyContent:'center',
                fontSize:11, color:'#8a8a8a', marginRight:12, fontFamily:'"Cormorant Garamond",serif' }}>{f.short}</div>
              <div style={{ flex:1, fontSize:15, color:'#1c1c1c' }}>{f.ja}</div>
              <input type="number" inputMode="decimal" step="0.5" value={draft.measures?.[f.key] ?? ''} placeholder="—"
                onChange={(e) => updateMeasure(f.key, e.target.value)}
                style={{ width:80, textAlign:'right', border:'none', borderBottom:'1px solid #d8d6d2',
                  background:'transparent', padding:'6px 4px', fontSize:16, fontFamily:'inherit',
                  fontVariantNumeric:'tabular-nums', color:'#1c1c1c', outline:'none' }} />
              <div style={{ width:28, fontSize:13, color:'#8a8a8a', textAlign:'right' }}>cm</div>
            </div>
          ))}
        </div>
        {suggestions.length > 0 && (
          <div style={{ padding:'12px 14px', background:'#fbf6f0', border:'1px solid #f1e2d3', marginBottom:14 }}>
            <div style={{ fontSize:11, letterSpacing:'0.16em', color:'#b86a4a', textTransform:'uppercase', marginBottom:8 }}>推定で補完</div>
            <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
              {suggestions.map(s => (
                <button key={s.key} onClick={() => updateMeasure(s.key, s.estimate)} style={{ appearance:'none',
                  border:'1px solid #e8c7b6', background:'#ffffff', color:'#b86a4a',
                  padding:'8px 14px', fontSize:13, cursor:'pointer', borderRadius:999, fontFamily:'inherit' }}>
                  {s.ja} ≈ {s.estimate}cm
                </button>
              ))}
            </div>
          </div>
        )}
        <div style={{ display:'flex', gap:10 }}>
          <button onClick={onClose} style={{ appearance:'none', cursor:'pointer', flex:1, background:'transparent',
            color:'#1c1c1c', border:'1px solid #d8d6d2', borderRadius:2, padding:'14px 18px', fontSize:15, fontFamily:'inherit', minHeight:52 }}>キャンセル</button>
          <button onClick={() => onSave(draft)} style={{ appearance:'none', cursor:'pointer', flex:2,
            background:'#1c1c1c', color:'#faf8f4', border:'none', borderRadius:2,
            padding:'14px 18px', fontSize:15, fontWeight:500, letterSpacing:'0.06em', fontFamily:'inherit', minHeight:52 }}>
            保存する
          </button>
        </div>
      </div>
    </div>
  );
}

function PasteSizeTableModal({ hintCategory, onClose, onResult }) {
  const [tab, setTab] = React.useState('text');
  const [text, setText] = React.useState('');
  const [imageData, setImageData] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [preview, setPreview] = React.useState(null);
  const [selectedIdxs, setSelectedIdxs] = React.useState({});
  const fileInputRef = React.useRef(null);
  const pasteAreaRef = React.useRef(null);

  const resetPreview = () => { setPreview(null); setError(null); setSelectedIdxs({}); };

  const processImageFile = (file) => {
    if (!file || !file.type.startsWith('image/')) { setError('画像ファイルを選択してください'); return; }
    resetPreview();
    const reader = new FileReader();
    reader.onload = (e) => {
      const dataUrl = e.target.result;
      const base64 = dataUrl.split(',')[1];
      setImageData({ base64, mimeType: file.type, preview: dataUrl });
    };
    reader.readAsDataURL(file);
  };

  React.useEffect(() => {
    if (tab !== 'image' || !pasteAreaRef.current) return;
    const el = pasteAreaRef.current;
    const onPaste = (e) => {
      const items = e.clipboardData?.items || [];
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          e.preventDefault();
          processImageFile(item.getAsFile());
          return;
        }
      }
    };
    el.addEventListener('paste', onPaste);
    return () => el.removeEventListener('paste', onPaste);
  }, [tab]);

  const initSelections = (sizes) => {
    const init = {};
    sizes.forEach((s, i) => { if (Object.keys(s.measures).length > 0) init[i] = true; });
    return init;
  };

  const onParse = async () => {
    if (!text.trim()) return;
    setLoading(true); setError(null); setPreview(null);
    try {
      const result = await window.fittoLLM.parseSizeTable(text, hintCategory);
      setPreview(result); setSelectedIdxs(initSelections(result.sizes || []));
    } catch (e) { setError(e.message || '読み取りに失敗しました'); }
    finally { setLoading(false); }
  };

  const onParseImage = async () => {
    if (!imageData) return;
    setLoading(true); setError(null); setPreview(null);
    try {
      const result = await window.fittoLLM.parseSizeTableFromImage(imageData.base64, imageData.mimeType, hintCategory);
      setPreview(result); setSelectedIdxs(initSelections(result.sizes || []));
    } catch (e) { setError(e.message || '画像の読み取りに失敗しました'); }
    finally { setLoading(false); }
  };

  const toggleSize = (i) => setSelectedIdxs(prev => ({ ...prev, [i]: !prev[i] }));
  const toggleAll = () => {
    if (!preview) return;
    const allOn = preview.sizes.every((_, i) => selectedIdxs[i]);
    if (allOn) setSelectedIdxs({});
    else setSelectedIdxs(initSelections(preview.sizes));
  };

  const fieldJa = { waist:'ウエスト', hip:'ヒップ', thigh:'もも幅', rise:'股上', hem:'裾幅', inseam:'股下',
    shoulder:'肩幅', chest:'身幅', length:'着丈', sleeve:'袖丈', cuff:'袖口', neck:'首回り' };
  const catLabel = { pants:'ボトムス', tops:'トップス', outer:'アウター' };
  const selectedSizes = preview ? preview.sizes.filter((_, i) => selectedIdxs[i]) : [];

  const tabStyle = (active) => ({
    flex:1, appearance:'none', border:'none', borderBottom: active ? '2px solid #1c1c1c' : '2px solid transparent',
    background:'transparent', padding:'12px 0', fontSize:14, fontWeight:active?600:400,
    color: active ? '#1c1c1c' : '#8a8a8a', cursor:'pointer', fontFamily:'inherit', letterSpacing:'0.04em', minHeight:48
  });

  return (
    <div style={{ position:'absolute', inset:0, zIndex:100, background:'rgba(28,28,28,0.45)',
      display:'flex', alignItems:'flex-end', justifyContent:'center' }}>
      <div style={{ width:'100%', background:'#faf8f4', borderTopLeftRadius:16, borderTopRightRadius:16,
        padding:'18px 22px 26px', maxHeight:'92%', overflowY:'auto' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
            <span style={{ width:28, height:28, borderRadius:'50%', background:'#1c1c1c', color:'#faf8f4',
              display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, fontFamily:'"Cormorant Garamond",serif' }}>AI</span>
            <div style={{ fontFamily:'"Cormorant Garamond","Noto Sans JP",serif', fontSize:22, fontWeight:500, color:'#1c1c1c' }}>AIでサイズを読み取る</div>
          </div>
          <button onClick={onClose} style={{ appearance:'none', border:'none', background:'transparent', fontSize:15, color:'#8a8a8a', cursor:'pointer', padding:8 }}>閉じる</button>
        </div>

        <div style={{ display:'flex', borderBottom:'1px solid #e8e6e2', marginBottom:18 }}>
          <button style={tabStyle(tab==='text')} onClick={() => { setTab('text'); resetPreview(); }}>テキスト</button>
          <button style={tabStyle(tab==='image')} onClick={() => { setTab('image'); resetPreview(); }}>画像</button>
        </div>

        {tab === 'text' && (
          <>
            <div style={{ fontSize:13, color:'#4a4a4a', lineHeight:1.7, marginBottom:12 }}>ECサイトのサイズ表をコピーしてペーストしてください。</div>
            <textarea value={text} onChange={(e) => setText(e.target.value)}
              placeholder={'例：\nサイズ  ウエスト  ヒップ  股上  股下  もも幅  裾幅\nS      78      101    26    60    29    15.5'}
              style={{ width:'100%', minHeight:160, padding:'12px 14px', border:'1px solid #e8e6e2', borderRadius:2,
                fontSize:14, fontFamily:'ui-monospace,"SF Mono",Menlo,monospace', color:'#1c1c1c',
                background:'#ffffff', resize:'vertical', outline:'none', boxSizing:'border-box' }} />
          </>
        )}

        {tab === 'image' && (
          <>
            <div style={{ fontSize:13, color:'#4a4a4a', lineHeight:1.7, marginBottom:12 }}>
              サイズ表の画像を読み込んでください。スクリーンショットのペースト、カメラ撮影、ファイル選択が使えます。
            </div>
            <div ref={pasteAreaRef} tabIndex={0}
              onDragOver={(e) => e.preventDefault()}
              onDrop={(e) => { e.preventDefault(); processImageFile(e.dataTransfer.files[0]); }}
              style={{ width:'100%', minHeight:160, border:'1px dashed #cdcac3', borderRadius:2, background:'#ffffff',
                display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
                gap:14, boxSizing:'border-box', outline:'none', cursor:'default', padding:'16px',
                overflow:'hidden', position:'relative' }}>
              {imageData ? (
                <>
                  <img src={imageData.preview} alt="" style={{ maxWidth:'100%', maxHeight:240, objectFit:'contain' }} />
                  <button onClick={() => setImageData(null)} style={{ appearance:'none', border:'none', background:'rgba(28,28,28,0.6)', color:'#fff',
                    padding:'6px 14px', borderRadius:999, fontSize:13, cursor:'pointer', fontFamily:'inherit' }}>削除</button>
                </>
              ) : (
                <>
                  <div style={{ fontSize:13, color:'#8a8a8a', textAlign:'center', lineHeight:1.8 }}>
                    ここに画像をペースト<br/>またはドロップ
                  </div>
                  <button onClick={() => fileInputRef.current?.click()} style={{ appearance:'none', cursor:'pointer', fontFamily:'inherit',
                    padding:'12px 24px', background:'#1c1c1c', color:'#faf8f4', border:'none', borderRadius:2, fontSize:14, minHeight:48 }}>
                    カメラ / ファイルを選択
                  </button>
                </>
              )}
            </div>
            <input ref={fileInputRef} type="file" accept="image/*" capture="environment"
              style={{ display:'none' }} onChange={(e) => processImageFile(e.target.files?.[0])} />
          </>
        )}
        {error && <div style={{ marginTop:12, padding:'12px 14px', background:'#fbf3ee', border:'1px solid #e8c7b6', color:'#b86a4a', fontSize:13, lineHeight:1.6 }}>{error}</div>}
        {preview && (
          <div style={{ marginTop:14, padding:'14px 16px', background:'#ffffff', border:'1px solid #ececec' }}>
            <div style={{ display:'flex', gap:10, alignItems:'baseline', marginBottom:10 }}>
              <div style={{ fontSize:11, letterSpacing:'0.18em', color:'#8a8a8a', textTransform:'uppercase' }}>読み取り結果</div>
              <div style={{ flex:1, height:1, background:'#e8e6e2' }} />
              <div style={{ fontSize:12, color:'#8a8a8a' }}>信頼度: {preview.confidence}</div>
            </div>
            <div style={{ fontSize:14, color:'#1c1c1c', marginBottom:14 }}><span style={{ color:'#8a8a8a' }}>カテゴリ: </span>{catLabel[preview.category]}</div>

            {preview.sizes.length === 0 ? (
              <div style={{ fontSize:13, color:'#b86a4a', padding:'10px 0' }}>サイズが読み取れませんでした</div>
            ) : (
              <>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
                  <div style={{ fontSize:11, letterSpacing:'0.16em', color:'#8a8a8a', textTransform:'uppercase' }}>使うサイズを選択（複数可）</div>
                  <button onClick={toggleAll} style={{ appearance:'none', border:'none', background:'transparent',
                    color:'#1c1c1c', fontSize:12, cursor:'pointer', fontFamily:'inherit', padding:'6px 10px' }}>
                    {preview.sizes.every((_, i) => selectedIdxs[i]) ? '全解除' : '全選択'}
                  </button>
                </div>
                <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                  {preview.sizes.map((s, i) => {
                    const sel = !!selectedIdxs[i];
                    const empty = Object.keys(s.measures).length === 0;
                    return (
                      <label key={i} style={{ display:'flex', alignItems:'center', gap:12, padding:'12px 14px', cursor: empty?'default':'pointer',
                        background:sel?'#1c1c1c':'#ffffff', color:sel?'#faf8f4':'#1c1c1c',
                        border:`1px solid ${sel?'#1c1c1c':'#d8d6d2'}`, opacity: empty ? 0.5 : 1 }}>
                        <input type="checkbox" checked={sel} disabled={empty} onChange={() => toggleSize(i)}
                          style={{ accentColor:sel?'#faf8f4':'#1c1c1c', width:20, height:20 }} />
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontSize:15, fontWeight:500, marginBottom:4 }}>
                            サイズ {s.sizeLabel || `#${i+1}`}
                            {s.isRange && <span style={{ marginLeft:6, opacity:0.6, fontSize:11 }}>±範囲</span>}
                          </div>
                          <div style={{ display:'flex', flexWrap:'wrap', gap:5 }}>
                            {empty ? (
                              <span style={{ fontSize:12, opacity:0.7 }}>項目読み取り失敗</span>
                            ) : (
                              Object.entries(s.measures).slice(0, 5).map(([k, v]) => (
                                <span key={k} style={{ fontSize:11, padding:'2px 8px',
                                  background: sel ? 'rgba(250,248,244,0.15)' : '#f3f0ea',
                                  color: sel ? 'rgba(250,248,244,0.9)' : '#4a4a4a',
                                  borderRadius:999, fontVariantNumeric:'tabular-nums' }}>
                                  {fieldJa[k]||k} {v}
                                </span>
                              ))
                            )}
                            {Object.keys(s.measures).length > 5 && <span style={{ fontSize:11, opacity:0.6 }}>+{Object.keys(s.measures).length-5}</span>}
                          </div>
                        </div>
                      </label>
                    );
                  })}
                </div>
              </>
            )}
            {preview.notes && <div style={{ fontSize:11, color:'#8a8a8a', lineHeight:1.6, marginTop:10 }}>※ {preview.notes}</div>}
          </div>
        )}
        <div style={{ display:'flex', gap:10, marginTop:18 }}>
          <button onClick={onClose} style={{ appearance:'none', cursor:'pointer', flex:1, background:'transparent',
            color:'#1c1c1c', border:'1px solid #d8d6d2', borderRadius:2, padding:'14px 18px', fontSize:15, fontFamily:'inherit', minHeight:52 }}>キャンセル</button>
          {!preview ? (
            tab === 'text' ? (
              <button onClick={onParse} disabled={loading||!text.trim()} style={{ appearance:'none', cursor:loading?'default':'pointer', flex:2,
                background:loading||!text.trim()?'#cdcac3':'#1c1c1c', color:'#faf8f4', border:'none', borderRadius:2,
                padding:'14px 18px', fontSize:15, fontWeight:500, letterSpacing:'0.06em', fontFamily:'inherit', minHeight:52 }}>
                {loading?'読み取り中…':'AIで読み取る'}
              </button>
            ) : (
              <button onClick={onParseImage} disabled={loading||!imageData} style={{ appearance:'none', cursor:loading?'default':'pointer', flex:2,
                background:loading||!imageData?'#cdcac3':'#1c1c1c', color:'#faf8f4', border:'none', borderRadius:2,
                padding:'14px 18px', fontSize:15, fontWeight:500, letterSpacing:'0.06em', fontFamily:'inherit', minHeight:52 }}>
                {loading?'解析中…':'画像を解析する'}
              </button>
            )
          ) : (
            <button onClick={() => onResult(preview, selectedSizes)}
              disabled={selectedSizes.length === 0} style={{ appearance:'none', cursor:'pointer', flex:2,
              background:selectedSizes.length === 0 ?'#cdcac3':'#1c1c1c',
              color:'#faf8f4', border:'none', borderRadius:2, padding:'14px 18px', fontSize:15, fontWeight:500,
              letterSpacing:'0.06em', fontFamily:'inherit', minHeight:52 }}>
              {selectedSizes.length > 0 ? `${selectedSizes.length}件を追加する` : 'サイズを選択してください'}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

window.fittoScreens.CompareInputScreen = CompareInputScreen;
